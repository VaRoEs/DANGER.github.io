<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win7 Скайп</title>
    
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Подключаем Metered SDK -->
    <script src="https://cdn.metered.ca/sdk/frame/1.4.3/sdk-frame.min.js"></script>

    <style>
        /* --- СТИЛЬ WINDOWS 7 AERO GLASS --- */
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            /* Имитация обоев Windows 7 */
            background: radial-gradient(circle at 50% 100%, #2989D8 0%, #155A8A 50%, #00284F 100%);
            min-height: 100vh; height: 100dvh; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }
        
        .aero-window {
            width: 95%; max-width: 450px;
            /* Эффект стекла */
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 25px rgba(255,255,255,0.7);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            display: flex; flex-direction: column;
            z-index: 10;
        }

        .title-bar {
            background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(220,220,220,0.3) 100%);
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            border-top-left-radius: 7px; border-top-right-radius: 7px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .title-bar .title {
            color: #000; font-size: 14px; font-weight: 600; text-shadow: 0 0 5px #fff, 0 0 10px #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .title-bar .controls {
            display: flex; gap: 4px;
        }
        .win-btn {
            width: 26px; height: 20px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5); cursor: pointer;
        }
        .win-btn.close {
            background: linear-gradient(to bottom, #faa 0%, #e33 50%, #c00 51%, #e33 100%);
        }

        .content-area {
            background: #fff;
            margin: 0 5px 5px 5px; border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.3);
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        h2 { color: #003399; font-size: 20px; margin-bottom: 20px; font-weight: 400; }
        
        .id-box { 
            background: #f0f4f8; padding: 15px; border-radius: 5px; margin-bottom: 20px; 
            width: 100%; border: 1px solid #cdd8e4; text-align: center;
        }
        .id-box p { color: #555; font-size: 13px; margin-bottom: 5px; }
        .my-id { font-size: 36px; color: #003399; letter-spacing: 3px; font-family: 'Consolas', monospace; }
        
        .status { 
            padding: 8px; border-radius: 3px; font-weight: 600; margin-bottom: 20px; 
            font-size: 13px; width: 100%; text-align: center; border: 1px solid transparent;
        }
        .status.success { background: #dff0d8; color: #3c763d; border-color: #d6e9c6; }
        .status.warning { background: #fcf8e3; color: #8a6d3b; border-color: #faebcc; }
        
        input {
            width: 100%; padding: 10px; border: 1px solid #abadb3; border-radius: 3px; font-size: 18px;
            text-align: center; margin-bottom: 15px; outline: none; background: #fff;
        }
        input:focus { border-color: #3399ff; box-shadow: 0 0 5px rgba(51,153,255,0.5); }
        
        /* Глянцевые кнопки Windows 7 */
        .glossy-btn {
            width: 100%; padding: 10px; border-radius: 3px; font-size: 15px;
            background: linear-gradient(to bottom, #f2f9fe 0%, #d6f0fd 49%, #bee6fd 50%, #a7d9f5 100%);
            border: 1px solid #7ebef7; color: #000; cursor: pointer; transition: 0.1s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.1);
        }
        .glossy-btn:hover { background: linear-gradient(to bottom, #e2f4fe 0%, #c6eafc 49%, #9edafb 50%, #87cbf3 100%); }
        .glossy-btn:active { background: linear-gradient(to bottom, #a7d9f5 0%, #bee6fd 49%, #d6f0fd 50%, #f2f9fe 100%); box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
        
        .glossy-btn.green {
            background: linear-gradient(to bottom, #f4fbf4 0%, #dcf0dc 49%, #c3e6c3 50%, #a8d9a8 100%);
            border-color: #7fbf7f;
        }
        .glossy-btn.red {
            background: linear-gradient(to bottom, #fbf4f4 0%, #f0dcdc 49%, #e6c3c3 50%, #d9a8a8 100%);
            border-color: #bf7f7f;
        }

        .incoming-box {
            display: none; background: #ffffcc; border: 1px solid #ffcc00;
            padding: 15px; border-radius: 3px; margin-top: 15px; width: 100%; text-align: center;
        }
        .incoming-box.active { display: block; }
        .incoming-box p { color: #333; font-size: 15px; margin-bottom: 10px; }
        .action-buttons { display: flex; gap: 5px; }

        /* --- ЭКРАН ЗВОНКА --- */
        #callScreen {
            display: none; width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; background: #000; z-index: 20;
        }
        #metered-frame { width: 100%; height: 100%; border: none; }
        
        #jpeg-screen-viewer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; background: #000; z-index: 50; display: none;
        }

        /* --- СВОЕ PiP ОКНО --- */
        #pip-container {
            position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px;
            background: #222; border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 8px; overflow: hidden; z-index: 150;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: none; cursor: move; /* Курсор для перетаскивания */
        }
        
        #local-video {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1); /* Зеркально */
        }

        .call-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
            background: rgba(255,255,255,0.3); padding: 10px; border-radius: 10px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="aero-window" id="mainWindow">
        <div class="title-bar">
            <div class="title">📱 Windows 7 Skype</div>
            <div class="controls">
                <button class="win-btn" style="background: linear-gradient(to bottom, #f0f0f0, #ccc);"></button>
                <button class="win-btn close" onclick="window.close()"></button>
            </div>
        </div>
        
        <div class="content-area" id="menuScreen">
            <h2>Ваш профиль</h2>
            
            <div class="id-box">
                <p>Твой постоянный ID:</p>
                <div class="my-id" id="myIdDisplay">0000</div>
            </div>
            
            <div class="status success" id="status">В сети. Ожидание вызовов...</div>
            
            <input type="text" id="remoteId" placeholder="ID друга (4 цифры)" maxlength="4" />
            
            <button class="glossy-btn" id="connectBtn" style="margin-bottom: 10px;">📞 Позвонить</button>
            
            <div class="incoming-box" id="incomingCall">
                <p>📞 Входящий: <strong id="callerIdDisplay">...</strong></p>
                <div class="action-buttons">
                    <button class="glossy-btn green" id="answerBtn">Принять</button>
                    <button class="glossy-btn red" id="rejectBtn">Отклонить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ЗВОНКА -->
    <div id="callScreen">
        <!-- Сюда вставляется видеосвязь Metered -->
        <div id="metered-frame"></div>
        
        <!-- Сюда вставляется JPEG-трансляция экрана, если она активна -->
        <img id="jpeg-screen-viewer" alt="Трансляция экрана" />
        
        <!-- Своё видео в углу (PiP) -->
        <div id="pip-container">
            <video id="local-video" autoplay muted playsinline></video>
        </div>

        <div class="call-controls">
            <button class="glossy-btn" id="jpegShareBtn" style="font-size: 13px;">🖥️ Поделиться экраном</button>
            <button class="glossy-btn red" id="leaveCallBtn">Завершить</button>
        </div>
    </div>

    <script>
        // --- 1. НАСТРОЙКИ FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyB2_1QSx32s7EpymuHZ0UzmHur4sSEiTvQ",
            authDomain: "skype7q.firebaseapp.com",
            databaseURL: "https://skype7q-default-rtdb.firebaseio.com",
            projectId: "skype7q",
            storageBucket: "skype7q.firebasestorage.app",
            messagingSenderId: "4846139446",
            appId: "1:4846139446:web:f2b24c3da4d0887f3a8097"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // --- 2. ИДЕНТИФИКАЦИЯ ---
        let myId = localStorage.getItem('my_skype_id');
        if (!myId) {
            myId = Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('my_skype_id', myId);
        }
        document.getElementById('myIdDisplay').textContent = myId;
        db.ref(`calls/${myId}`).remove(); // Очистка при загрузке

        let inCall = false;
        let activeRemoteId = null; 
        let myLocalStream = null;

        // --- 3. ИНТЕРФЕЙС ---
        function updateStatus(msg, type = 'success') {
            const el = document.getElementById('status');
            el.textContent = msg; el.className = 'status ' + type;
        }

        // --- 4. ВХОДЯЩИЕ ЗВОНКИ ---
        db.ref(`calls/${myId}`).on('value', snapshot => {
            const data = snapshot.val();
            if (data && data.status === 'ringing') {
                if (inCall) { db.ref(`calls/${myId}`).update({ status: 'rejected' }); return; }
                activeRemoteId = data.callerId;
                document.getElementById('callerIdDisplay').textContent = data.callerId;
                document.getElementById('incomingCall').classList.add('active');
                updateStatus('Входящий вызов...', 'warning');
            } else {
                document.getElementById('incomingCall').classList.remove('active');
                if (!inCall) updateStatus('В сети. Ожидание вызовов...', 'success');
            }
        });

        // --- 5. ИСХОДЯЩИЙ ЗВОНОК ---
        document.getElementById('connectBtn').onclick = () => {
            const remoteId = document.getElementById('remoteId').value.trim();
            if (!remoteId || remoteId === myId) return alert('Введите корректный ID');
            
            inCall = true;
            activeRemoteId = remoteId;
            updateStatus('Дозвон...', 'warning');
            
            const btn = document.getElementById('connectBtn');
            btn.textContent = 'Отменить вызов';
            
            let callRef = db.ref(`calls/${remoteId}`);
            callRef.set({ callerId: myId, status: 'ringing' });

            btn.onclick = () => {
                callRef.remove(); callRef.off(); inCall = false; activeRemoteId = null;
                btn.textContent = '📞 Позвонить'; btn.onclick = arguments.callee;
                updateStatus('В сети', 'success');
            };

            callRef.on('value', snap => {
                const data = snap.val();
                if (data && data.status === 'answered') {
                    callRef.off(); callRef.remove(); startCall();
                } else if (data && data.status === 'rejected') {
                    callRef.off(); inCall = false; activeRemoteId = null;
                    btn.textContent = '📞 Позвонить'; btn.onclick = arguments.callee;
                    updateStatus('Отклонено/Занято', 'warning');
                    setTimeout(() => updateStatus('В сети', 'success'), 3000);
                }
            });
        };

        // --- 6. ПРИНЯТЬ / ОТКЛОНИТЬ ---
        document.getElementById('answerBtn').onclick = () => {
            inCall = true; document.getElementById('incomingCall').classList.remove('active');
            db.ref(`calls/${myId}`).update({ status: 'answered' });
            startCall();
        };
        document.getElementById('rejectBtn').onclick = () => {
            document.getElementById('incomingCall').classList.remove('active');
            db.ref(`calls/${myId}`).update({ status: 'rejected' });
            setTimeout(() => db.ref(`calls/${myId}`).remove(), 1000);
            updateStatus('В сети', 'success');
        };

        // --- 7. ЗАПУСК ЗВОНКА (КАМЕРА + METERED) ---
        async function startCall() {
            document.getElementById('mainWindow').style.display = 'none';
            document.getElementById('callScreen').style.display = 'block';
            document.getElementById('pip-container').style.display = 'block';

            // 1. Запрашиваем свою камеру
            try {
                myLocalStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = myLocalStream;
            } catch (e) {
                console.warn("Не удалось получить доступ к камере", e);
            }

            // 2. Включаем Metered
            var frame = new MeteredFrame(); 
            frame.init({
                roomURL: "skype777.metered.live/78",
                requireCamera: false, // Отключаем встроенный запрос камеры в iframe
                requireMicrophone: false
            }, document.getElementById("metered-frame"));

            // 3. Если камера получена, отправляем её в Metered через API
            if (myLocalStream) {
                // Подписываемся на событие присоединения к комнате, чтобы отправить медиа
                window.addEventListener('message', function(event) {
                    if(event.data && event.data.type === 'metered_join') {
                        const videoTrack = myLocalStream.getVideoTracks()[0];
                        const audioTrack = myLocalStream.getAudioTracks()[0];
                        
                        // Используем API metered-frame для шаринга локального медиа
                        if (videoTrack) frame.shareVideo(videoTrack);
                        if (audioTrack) frame.shareAudio(audioTrack);
                    }
                });
            }

            // 4. Слушаем JPEG-трансляцию экрана от собеседника
            if (activeRemoteId) {
                db.ref(`screenshares/${activeRemoteId}`).on('value', snap => {
                    const data = snap.val();
                    const viewer = document.getElementById('jpeg-screen-viewer');
                    if(data && data.img) {
                        viewer.src = data.img;
                        viewer.style.display = 'block';
                    } else {
                        viewer.style.display = 'none';
                    }
                });
            }
        }

        // Завершение звонка
        document.getElementById('leaveCallBtn').onclick = () => {
            db.ref(`calls/${myId}`).remove();
            if(activeRemoteId) db.ref(`screenshares/${activeRemoteId}`).off();
            stopJpegScreenShare();
            if (myLocalStream) myLocalStream.getTracks().forEach(t => t.stop());
            window.location.reload(); 
        };

        // --- 8. JPEG ТРАНСЛЯЦИЯ ЭКРАНА ---
        let screenStream = null;
        let jpegInterval = null;
        let isSharing = false;

        document.getElementById('jpegShareBtn').onclick = async () => {
            if (isSharing) { stopJpegScreenShare(); return; }

            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always" }, audio: false });
                isSharing = true;
                document.getElementById('jpegShareBtn').textContent = '⏹️ Остановить';
                document.getElementById('jpegShareBtn').classList.add('red');

                const video = document.createElement('video');
                video.srcObject = screenStream;
                video.play();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                // Отправляем картинку в Firebase (~10 FPS)
                jpegInterval = setInterval(() => {
                    if (video.videoWidth) {
                        canvas.width = 640; 
                        canvas.height = (video.videoHeight / video.videoWidth) * 640;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        // JPEG качество 40% (увеличена частота до 100ms)
                        const jpegData = canvas.toDataURL('image/jpeg', 0.4); 
                        db.ref(`screenshares/${myId}`).set({ img: jpegData, ts: Date.now() });
                    }
                }, 100); 

                screenStream.getVideoTracks()[0].onended = stopJpegScreenShare;

            } catch (e) { alert('Не удалось захватить экран. ' + e.message); }
        };

        function stopJpegScreenShare() {
            isSharing = false;
            clearInterval(jpegInterval);
            if(screenStream) screenStream.getTracks().forEach(t => t.stop());
            db.ref(`screenshares/${myId}`).remove();
            
            const btn = document.getElementById('jpegShareBtn');
            if (btn) {
                btn.textContent = '🖥️ Поделиться экраном';
                btn.classList.remove('red');
            }
        }

        // --- 9. ПЕРЕТАСКИВАНИЕ PiP ОКНА ---
        const pip = document.getElementById('pip-container');
        let isDragging = false, startX, startY, initialX, initialY;

        pip.onmousedown = function(e) {
            isDragging = true;
            startX = e.clientX; startY = e.clientY;
            const rect = pip.getBoundingClientRect();
            initialX = rect.left; initialY = rect.top;
            
            // Отключаем привязку bottom/right, переходим на top/left
            pip.style.bottom = 'auto'; pip.style.right = 'auto';
            pip.style.left = initialX + 'px'; pip.style.top = initialY + 'px';
        };

        document.onmousemove = function(e) {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            pip.style.left = (initialX + dx) + 'px';
            pip.style.top = (initialY + dy) + 'px';
        };

        document.onmouseup = function() { isDragging = false; };
    </script>
</body>
</html>
