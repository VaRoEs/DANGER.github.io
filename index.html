<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win7 Скайп (WebRTC Pro 3.0)</title>
    
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- СТИЛЬ WINDOWS 7 AERO GLASS --- */
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: radial-gradient(circle at 50% 100%, #2989D8 0%, #155A8A 50%, #00284F 100%);
            min-height: 100vh; height: 100dvh; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }
        
        .aero-window {
            width: 95%; max-width: 450px;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 25px rgba(255,255,255,0.7);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
        }

        .aero-window.expanded { max-width: 800px; width: 98%; }

        .title-bar {
            background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(220,220,220,0.3) 100%);
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            border-top-left-radius: 7px; border-top-right-radius: 7px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .title-bar .title {
            color: #000; font-size: 14px; font-weight: 600; text-shadow: 0 0 5px #fff, 0 0 10px #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .title-bar .controls { display: flex; gap: 4px; }
        
        .win-btn {
            width: 26px; height: 20px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5); cursor: pointer;
        }
        .win-btn.min { background: linear-gradient(to bottom, #f0f0f0, #ccc); }
        .win-btn.close { background: linear-gradient(to bottom, #faa 0%, #e33 50%, #c00 51%, #e33 100%); }

        .content-area {
            background: #fff; margin: 0 5px 5px 5px; border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.3); padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        h2 { color: #003399; font-size: 20px; margin-bottom: 20px; font-weight: 400; }
        
        .id-box { 
            background: #f0f4f8; padding: 15px; border-radius: 5px; margin-bottom: 20px; 
            width: 100%; border: 1px solid #cdd8e4; text-align: center; position: relative;
        }
        .id-box p { color: #555; font-size: 13px; margin-bottom: 5px; }
        .my-id { font-size: 36px; color: #003399; letter-spacing: 3px; font-family: 'Consolas', monospace; }
        
        .settings-icon-btn {
            position: absolute; top: 10px; right: 10px; background: none; border: none;
            font-size: 20px; cursor: pointer; transition: transform 0.2s;
        }
        .settings-icon-btn:hover { transform: rotate(45deg); }

        .status { 
            padding: 8px; border-radius: 3px; font-weight: 600; margin-bottom: 20px; 
            font-size: 13px; width: 100%; text-align: center; border: 1px solid transparent;
        }
        .status.success { background: #dff0d8; color: #3c763d; border-color: #d6e9c6; }
        .status.warning { background: #fcf8e3; color: #8a6d3b; border-color: #faebcc; }
        
        input {
            width: 100%; padding: 10px; border: 1px solid #abadb3; border-radius: 3px; font-size: 18px;
            text-align: center; margin-bottom: 15px; outline: none; background: #fff;
        }
        input:focus { border-color: #3399ff; box-shadow: 0 0 5px rgba(51,153,255,0.5); }
        
        .glossy-btn {
            width: 100%; padding: 10px; border-radius: 3px; font-size: 14px; font-weight: 600;
            background: linear-gradient(to bottom, #f2f9fe 0%, #d6f0fd 49%, #bee6fd 50%, #a7d9f5 100%);
            border: 1px solid #7ebef7; color: #000; cursor: pointer; transition: 0.1s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .glossy-btn:hover { background: linear-gradient(to bottom, #e2f4fe 0%, #c6eafc 49%, #9edafb 50%, #87cbf3 100%); }
        .glossy-btn:active { background: linear-gradient(to bottom, #a7d9f5 0%, #bee6fd 49%, #d6f0fd 50%, #f2f9fe 100%); box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
        .glossy-btn.green { background: linear-gradient(to bottom, #f4fbf4 0%, #dcf0dc 49%, #c3e6c3 50%, #a8d9a8 100%); border-color: #7fbf7f; }
        .glossy-btn.red { background: linear-gradient(to bottom, #fbf4f4 0%, #f0dcdc 49%, #e6c3c3 50%, #d9a8a8 100%); border-color: #bf7f7f; }
        .glossy-btn.small { padding: 8px 4px; font-size: 12px; }

        .incoming-box {
            display: none; background: #ffffcc; border: 1px solid #ffcc00;
            padding: 15px; border-radius: 3px; margin-top: 15px; width: 100%; text-align: center;
        }
        .incoming-box.active { display: block; }
        .incoming-box p { color: #333; font-size: 15px; margin-bottom: 10px; }
        .action-buttons { display: flex; gap: 5px; }

        /* --- ЭКРАН ЗВОНКА (ВИДЕО) --- */
        #callScreen { display: none; width: 100%; flex-direction: column; align-items: center; }
        
        .video-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 4px; overflow: hidden; border: 1px solid #000;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.2); margin-bottom: 15px; cursor: pointer;
        }
        .video-wrapper:fullscreen { border: none; border-radius: 0; box-shadow: none; }
        
        video { width: 100%; height: 100%; object-fit: contain; background: #111; }
        
        #localVideo {
            position: absolute; bottom: 10px; right: 10px;
            width: 25%; max-width: 150px; aspect-ratio: 16/9;
            border: 2px solid rgba(255,255,255,0.8); border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 10;
            object-fit: cover; transform: scaleX(-1); transition: opacity 0.3s;
        }
        
        .call-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .call-controls .glossy-btn { margin: 0; }
        .full-width { grid-column: span 2; }
        
        /* --- ОКНО НАСТРОЕК (ОВЕРЛЕЙ) --- */
        #settingsOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .settings-content-area { align-items: flex-start; width: 100%; text-align: left; }
        .settings-content-area label { font-weight: 600; font-size: 13px; color: #333; margin-top: 10px; margin-bottom: 5px; display: block; }
        .settings-content-area select { width: 100%; padding: 6px; border-radius: 3px; border: 1px solid #abadb3; outline: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <!-- Главное окно -->
    <div class="aero-window" id="mainWindow">
        <div class="title-bar">
            <div class="title">📱 Windows 7 Skype</div>
            <div class="controls"><button class="win-btn min"></button><button class="win-btn close" onclick="window.close()"></button></div>
        </div>
        
        <div class="content-area" id="menuScreen">
            <h2>Ваш профиль</h2>
            <div class="id-box">
                <button class="settings-icon-btn" onclick="openSettings()" title="Настройки устройств">⚙️</button>
                <p>Твой постоянный ID:</p>
                <div class="my-id" id="myIdDisplay">0000</div>
            </div>
            
            <div class="status success" id="status">В сети. Ожидание вызовов...</div>
            <input type="text" id="remoteId" placeholder="ID друга (4 цифры)" maxlength="4" />
            <button class="glossy-btn" id="connectBtn">📞 Позвонить (Видео)</button>
            
            <div class="incoming-box" id="incomingCall">
                <p>📞 Входящий: <strong id="callerIdDisplay">...</strong></p>
                <div class="action-buttons">
                    <button class="glossy-btn green" id="answerBtn">Принять</button>
                    <button class="glossy-btn red" id="rejectBtn">Отклонить</button>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ЗВОНКА -->
        <div class="content-area" id="callScreen">
            <div class="video-wrapper" id="videoContainer" title="Двойной клик для полного экрана">
                <video id="remoteVideo" autoplay playsinline></video>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            
            <div class="call-controls">
                <button class="glossy-btn small" id="toggleCamBtn">📷 Выкл Кам</button>
                <button class="glossy-btn small" id="toggleMicBtn">🎤 Выкл Микр</button>
                <button class="glossy-btn small" id="togglePipBtn">👁️ Скрыть себя</button>
                <button class="glossy-btn small" id="fullscreenBtn">🔲 Полный экран</button>
                <button class="glossy-btn small full-width" id="screenShareBtn">🖥️ Демонстрация экрана (60 FPS)</button>
                <button class="glossy-btn red full-width" id="leaveCallBtn">☎️ Завершить вызов</button>
            </div>
        </div>
    </div>

    <!-- ОКНО НАСТРОЕК -->
    <div id="settingsOverlay">
        <div class="aero-window" style="max-width: 320px; width: 90%;">
            <div class="title-bar">
                <div class="title">⚙️ Настройки устройств</div>
                <div class="controls"><button class="win-btn close" onclick="closeSettings()"></button></div>
            </div>
            <div class="content-area settings-content-area">
                <p style="font-size: 12px; color: #666; margin-bottom: 10px;">Выберите устройства для звонков.</p>
                <label>Камера:</label><select id="camSelect"></select>
                <label>Микрофон:</label><select id="micSelect"></select>
                <button class="glossy-btn" onclick="closeSettings()" style="margin-top: 15px;">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2_1QSx32s7EpymuHZ0UzmHur4sSEiTvQ",
            authDomain: "skype7q.firebaseapp.com",
            databaseURL: "https://skype7q-default-rtdb.firebaseio.com",
            projectId: "skype7q",
            storageBucket: "skype7q.firebasestorage.app",
            messagingSenderId: "4846139446",
            appId: "1:4846139446:web:f2b24c3da4d0887f3a8097"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let myId = localStorage.getItem('my_skype_id') || Math.floor(1000 + Math.random() * 9000).toString();
        localStorage.setItem('my_skype_id', myId);
        document.getElementById('myIdDisplay').textContent = myId;
        
        let inCall = false; let activeRemoteId = null; let peerConnection = null;
        let localStream = null; let screenStream = null;
        let iceQueue = []; // Очередь для защиты от гонки ICE кандидатов (баг черного экрана)

        const pcConfig = {
            iceServers: [ { urls: 'stun:stun1.l.google.com:19302' }, { urls: 'stun:stun2.l.google.com:19302' } ]
        };

        function updateStatus(msg, type = 'success') {
            const el = document.getElementById('status');
            el.textContent = msg; el.className = 'status ' + type;
        }

        async function openSettings() {
            document.getElementById('settingsOverlay').style.display = 'flex';
            const camSelect = document.getElementById('camSelect');
            const micSelect = document.getElementById('micSelect');
            camSelect.innerHTML = '<option value="">По умолчанию / Нет камеры</option>';
            micSelect.innerHTML = '<option value="">По умолчанию / Нет микрофона</option>';

            try {
                let devices = await navigator.mediaDevices.enumerateDevices();
                if (devices.every(d => !d.label)) {
                    try {
                        const tempStream = await navigator.mediaDevices.getUserMedia({audio: true, video: true});
                        tempStream.getTracks().forEach(t => t.stop());
                        devices = await navigator.mediaDevices.enumerateDevices();
                    } catch(e) {}
                }
                
                devices.forEach(device => {
                    if (device.kind === 'videoinput') camSelect.innerHTML += `<option value="${device.deviceId}">${device.label || 'Камера'}</option>`;
                    else if (device.kind === 'audioinput') micSelect.innerHTML += `<option value="${device.deviceId}">${device.label || 'Микрофон'}</option>`;
                });
                camSelect.value = localStorage.getItem('pref_cam') || "";
                micSelect.value = localStorage.getItem('pref_mic') || "";
            } catch (err) {}
        }

        function closeSettings() {
            localStorage.setItem('pref_cam', document.getElementById('camSelect').value);
            localStorage.setItem('pref_mic', document.getElementById('micSelect').value);
            document.getElementById('settingsOverlay').style.display = 'none';
        }

        async function getSafeMedia() {
            const camId = localStorage.getItem('pref_cam');
            const micId = localStorage.getItem('pref_mic');
            localStream = new MediaStream();
            let audioSuccess = false, videoSuccess = false;

            try {
                const aStream = await navigator.mediaDevices.getUserMedia({ audio: micId ? { deviceId: { exact: micId } } : true });
                aStream.getTracks().forEach(t => localStream.addTrack(t));
                audioSuccess = true;
            } catch(e) { console.warn("Микрофон недоступен", e); }

            try {
                const vStream = await navigator.mediaDevices.getUserMedia({ video: camId ? { deviceId: { exact: camId } } : true });
                vStream.getTracks().forEach(t => localStream.addTrack(t));
                videoSuccess = true;
            } catch(e) { console.warn("Камера недоступна", e); }

            if (!audioSuccess && !videoSuccess) alert("Нет доступа к медиа! Звонок может не работать.");

            if (!videoSuccess && document.createElement('canvas').captureStream) {
                const canvas = document.createElement('canvas'); canvas.width = 640; canvas.height = 480;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#222'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#aaa'; ctx.font = '24px Segoe UI'; ctx.textAlign = 'center'; ctx.fillText('Камера отключена', 320, 240);
                canvas.captureStream(1).getTracks().forEach(t => { t.isDummy = true; localStream.addTrack(t); });
            }
            document.getElementById('localVideo').srcObject = localStream;
            return true;
        }

        db.ref(`calls/${myId}`).remove();
        db.ref(`calls/${myId}`).on('value', snapshot => {
            const data = snapshot.val();
            if (data && data.status === 'ringing') {
                if (inCall) { db.ref(`calls/${myId}`).update({ status: 'rejected' }); return; }
                activeRemoteId = data.callerId;
                document.getElementById('callerIdDisplay').textContent = data.callerId;
                document.getElementById('incomingCall').classList.add('active');
                updateStatus('Входящий видеовызов...', 'warning');
            } else if (!data) {
                if (inCall) hangup(false); 
                document.getElementById('incomingCall').classList.remove('active');
                if (!inCall) updateStatus('В сети', 'success');
            }
        });

        document.getElementById('connectBtn').onclick = async () => {
            const remoteId = document.getElementById('remoteId').value.trim();
            if (!remoteId || remoteId === myId) return alert('Введите корректный ID');
            
            await getSafeMedia();
            inCall = true; activeRemoteId = remoteId;
            updateStatus('Дозвон...', 'warning');
            
            const btn = document.getElementById('connectBtn');
            btn.textContent = 'Отменить вызов';
            initPeerConnection(remoteId, true);

            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await db.ref(`calls/${remoteId}`).set({ callerId: myId, status: 'ringing', offer: { type: offer.type, sdp: offer.sdp } });
            } catch(e) { hangup(); }

            btn.onclick = () => { db.ref(`calls/${remoteId}`).remove(); hangup(); btn.textContent = '📞 Позвонить (Видео)'; btn.onclick = arguments.callee; };

            db.ref(`calls/${remoteId}`).on('value', snap => {
                const data = snap.val();
                if (data && data.status === 'answered' && data.answer) {
                    if (peerConnection.signalingState !== "stable") {
                        peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer))
                        .then(() => {
                            // Применяем накопленные ICE кандидаты после установки описания
                            iceQueue.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)).catch(console.error));
                            iceQueue = [];
                        }).catch(console.error);
                    }
                    switchToCallScreen();
                } else if (data && data.status === 'rejected') {
                    hangup(); btn.textContent = '📞 Позвонить (Видео)'; btn.onclick = arguments.callee;
                    updateStatus('Отклонено/Занято', 'warning'); setTimeout(() => updateStatus('В сети', 'success'), 3000);
                } else if (!data && inCall) { hangup(); }
            });

            db.ref(`calls/${remoteId}/calleeCandidates`).on('child_added', snap => {
                const candidate = snap.val();
                if (peerConnection && peerConnection.remoteDescription && peerConnection.remoteDescription.type) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(console.error);
                } else {
                    iceQueue.push(candidate);
                }
            });
        };

        document.getElementById('answerBtn').onclick = async () => {
            document.getElementById('incomingCall').classList.remove('active');
            updateStatus('Подключение...', 'warning');
            
            await getSafeMedia();
            inCall = true;
            const callRef = db.ref(`calls/${myId}`);
            
            callRef.once('value', async snap => {
                const data = snap.val();
                if(!data || !data.offer) return hangup();
                initPeerConnection(myId, false);
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    // Применяем накопленные ICE
                    iceQueue.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)).catch(console.error));
                    iceQueue = [];
                    
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    await callRef.update({ status: 'answered', answer: { type: answer.type, sdp: answer.sdp }});
                    switchToCallScreen();
                } catch(e) { hangup(); }
            });

            callRef.child('callerCandidates').on('child_added', snap => {
                const candidate = snap.val();
                if (peerConnection && peerConnection.remoteDescription && peerConnection.remoteDescription.type) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(console.error);
                } else {
                    iceQueue.push(candidate);
                }
            });
        };

        document.getElementById('rejectBtn').onclick = () => {
            document.getElementById('incomingCall').classList.remove('active');
            db.ref(`calls/${myId}`).update({ status: 'rejected' });
            setTimeout(() => db.ref(`calls/${myId}`).remove(), 1000);
            updateStatus('В сети', 'success');
        };

        function initPeerConnection(dbNodeId, isCaller) {
            iceQueue = [];
            peerConnection = new RTCPeerConnection(pcConfig);

            if (localStream) { localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream)); }

            peerConnection.ontrack = event => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    remoteVideo.play().catch(e => console.warn(e)); // Гарантируем воспроизведение
                }
            };

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    const path = isCaller ? 'callerCandidates' : 'calleeCandidates';
                    db.ref(`calls/${dbNodeId}/${path}`).push(event.candidate.toJSON());
                }
            };
        }

        function switchToCallScreen() {
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('mainWindow').classList.add('expanded');
        }

        document.getElementById('leaveCallBtn').onclick = () => hangup();

        function hangup(deleteDb = true) {
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
            inCall = false; peerConnection = null; iceQueue = [];

            if (deleteDb) {
                if (activeRemoteId) db.ref(`calls/${activeRemoteId}`).remove();
                db.ref(`calls/${myId}`).remove();
            }
            activeRemoteId = null;
            document.getElementById('menuScreen').style.display = 'flex';
            document.getElementById('callScreen').style.display = 'none';
            document.getElementById('mainWindow').classList.remove('expanded');
            document.getElementById('connectBtn').textContent = '📞 Позвонить (Видео)';
            updateStatus('В сети', 'success');
        }

        // --- ДЕМОНСТРАЦИЯ ЭКРАНА ---
        document.getElementById('screenShareBtn').onclick = async () => {
            const btn = document.getElementById('screenShareBtn');
            if (screenStream) { stopScreenShare(); return; }

            try {
                if (!navigator.mediaDevices.getDisplayMedia) throw new Error("Браузер не поддерживает захват экрана.");
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: { ideal: 60, max: 60 } }, audio: true });
                const screenTrack = screenStream.getVideoTracks()[0];
                
                if (peerConnection) {
                    const senders = peerConnection.getSenders();
                    const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                    if (videoSender) videoSender.replaceTrack(screenTrack);
                }

                // ИЗМЕНЕНИЕ: Мы больше НЕ заменяем локальное PiP окно (свое лицо) на трансляцию экрана.
                // Трансляция экрана отправляется напрямую собеседнику, а у тебя в PiP остается веб-камера!

                btn.textContent = '⏹️ Остановить демонстрацию';
                btn.classList.add('red');
                screenTrack.onended = () => stopScreenShare();

            } catch (err) { alert('Ошибка: ' + err.message); }
        };

        function stopScreenShare() {
            if (!screenStream) return;
            screenStream.getTracks().forEach(t => t.stop()); screenStream = null;
            const btn = document.getElementById('screenShareBtn');
            
            if (localStream && peerConnection) {
                const camTrack = localStream.getVideoTracks()[0];
                const senders = peerConnection.getSenders();
                const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                if (videoSender && camTrack) videoSender.replaceTrack(camTrack);
            }
            btn.textContent = '🖥️ Демонстрация экрана (60 FPS)'; btn.classList.remove('red');
        }

        document.getElementById('toggleCamBtn').onclick = (e) => {
            if(!localStream) return;
            const videoTrack = localStream.getVideoTracks()[0];
            if(videoTrack && !videoTrack.isDummy) {
                videoTrack.enabled = !videoTrack.enabled;
                e.target.textContent = videoTrack.enabled ? '📷 Выкл Кам' : '📸 Вкл Кам';
                e.target.classList.toggle('red', !videoTrack.enabled);
            } else alert("Нет камеры для отключения.");
        };

        document.getElementById('toggleMicBtn').onclick = (e) => {
            if(!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            if(audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                e.target.textContent = audioTrack.enabled ? '🎤 Выкл Микр' : '🎙️ Вкл Микр';
                e.target.classList.toggle('red', !audioTrack.enabled);
            }
        };

        document.getElementById('togglePipBtn').onclick = (e) => {
            const pip = document.getElementById('localVideo');
            if (pip.style.opacity === '0') {
                pip.style.opacity = '1'; pip.style.pointerEvents = 'auto'; e.target.textContent = '👁️ Скрыть себя';
            } else {
                pip.style.opacity = '0'; pip.style.pointerEvents = 'none'; e.target.textContent = '👁️ Показать себя';
            }
        };

        function toggleFullScreen() {
            const wrapper = document.getElementById('videoContainer');
            if (!document.fullscreenElement) {
                if (wrapper.requestFullscreen) wrapper.requestFullscreen();
                else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
            } else { if (document.exitFullscreen) document.exitFullscreen(); }
        }
        document.getElementById('fullscreenBtn').onclick = toggleFullScreen;
        document.getElementById('videoContainer').ondblclick = toggleFullScreen;
    </script>
</body>
</html>
