<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win7 Скайп (Native WebRTC)</title>
    
    <!-- Подключаем Firebase (используем его только для сигналлинга вместо Python) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- СТИЛЬ WINDOWS 7 AERO GLASS --- */
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: radial-gradient(circle at 50% 100%, #2989D8 0%, #155A8A 50%, #00284F 100%);
            min-height: 100vh; height: 100dvh; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }
        
        .aero-window {
            width: 95%; max-width: 450px; min-height: 400px;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 25px rgba(255,255,255,0.7);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            display: flex; flex-direction: column;
            transition: max-width 0.5s ease-in-out, height 0.5s ease-in-out;
        }

        .aero-window.in-call {
            max-width: 1000px;
            height: 85vh;
        }

        .title-bar {
            background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(220,220,220,0.3) 100%);
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            border-top-left-radius: 7px; border-top-right-radius: 7px;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .title-bar .title {
            color: #000; font-size: 14px; font-weight: 600; text-shadow: 0 0 5px #fff, 0 0 10px #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .title-bar .controls {
            display: flex; gap: 4px;
        }
        .win-btn {
            width: 26px; height: 20px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5); cursor: pointer;
        }
        .win-btn.close {
            background: linear-gradient(to bottom, #faa 0%, #e33 50%, #c00 51%, #e33 100%);
        }

        .content-area {
            background: #fff;
            margin: 0 5px 5px 5px; border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.3);
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            flex-grow: 1;
        }

        h2 { color: #003399; font-size: 20px; margin-bottom: 20px; font-weight: 400; }
        
        .id-box { 
            background: #f0f4f8; padding: 15px; border-radius: 5px; margin-bottom: 20px; 
            width: 100%; border: 1px solid #cdd8e4; text-align: center;
        }
        .id-box p { color: #555; font-size: 13px; margin-bottom: 5px; }
        .my-id { font-size: 36px; color: #003399; letter-spacing: 3px; font-family: 'Consolas', monospace; }
        
        .status { 
            padding: 8px; border-radius: 3px; font-weight: 600; margin-bottom: 20px; 
            font-size: 13px; width: 100%; text-align: center; border: 1px solid transparent;
        }
        .status.success { background: #dff0d8; color: #3c763d; border-color: #d6e9c6; }
        .status.warning { background: #fcf8e3; color: #8a6d3b; border-color: #faebcc; }
        
        input {
            width: 100%; padding: 10px; border: 1px solid #abadb3; border-radius: 3px; font-size: 18px;
            text-align: center; margin-bottom: 15px; outline: none; background: #fff;
        }
        input:focus { border-color: #3399ff; box-shadow: 0 0 5px rgba(51,153,255,0.5); }
        
        .glossy-btn {
            width: 100%; padding: 10px; border-radius: 3px; font-size: 15px;
            background: linear-gradient(to bottom, #f2f9fe 0%, #d6f0fd 49%, #bee6fd 50%, #a7d9f5 100%);
            border: 1px solid #7ebef7; color: #000; cursor: pointer; transition: 0.1s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.1);
        }
        .glossy-btn:hover { background: linear-gradient(to bottom, #e2f4fe 0%, #c6eafc 49%, #9edafb 50%, #87cbf3 100%); }
        
        .glossy-btn.green {
            background: linear-gradient(to bottom, #f4fbf4 0%, #dcf0dc 49%, #c3e6c3 50%, #a8d9a8 100%);
            border-color: #7fbf7f;
        }
        .glossy-btn.red {
            background: linear-gradient(to bottom, #fbf4f4 0%, #f0dcdc 49%, #e6c3c3 50%, #d9a8a8 100%);
            border-color: #bf7f7f;
        }

        .incoming-box {
            display: none; background: #ffffcc; border: 1px solid #ffcc00;
            padding: 15px; border-radius: 3px; margin-top: 15px; width: 100%; text-align: center;
        }
        .incoming-box.active { display: block; animation: popIn 0.3s ease-out; }
        .incoming-box p { color: #333; font-size: 15px; margin-bottom: 10px; }
        .action-buttons { display: flex; gap: 5px; }

        /* --- ЭКРАН ЗВОНКА (Чистый WebRTC) --- */
        #callScreen {
            display: none; width: 100%; flex-grow: 1; position: relative;
            background: #000; border-radius: 0 0 7px 7px; overflow: hidden;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        .video-remote {
            width: 100%; height: 100%; object-fit: contain; background: #111;
        }
        
        /* Зеркалируем локальное видео по умолчанию, так как старт с фронталки */
        .video-local {
            position: absolute; bottom: 80px; right: 20px; 
            width: 160px; height: 120px; 
            object-fit: cover; border-radius: 8px; background: #222; 
            border: 2px solid rgba(255,255,255,0.7);
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            transform: scaleX(-1); 
            z-index: 5;
            display: none;
        }

        .call-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
            background: rgba(255,255,255,0.3); padding: 10px; border-radius: 10px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="aero-window" id="mainWindow">
        <div class="title-bar">
            <div class="title">📱 Windows 7 Skype</div>
            <div class="controls">
                <button class="win-btn" style="background: linear-gradient(to bottom, #f0f0f0, #ccc);"></button>
                <button class="win-btn close" onclick="window.close()"></button>
            </div>
        </div>
        
        <!-- МЕНЮ -->
        <div class="content-area" id="menuScreen">
            <h2>Ваш профиль</h2>
            <div class="id-box">
                <p>Твой постоянный ID:</p>
                <div class="my-id" id="myIdDisplay">0000</div>
            </div>
            
            <div class="status success" id="status">В сети. Ожидание вызовов...</div>
            <input type="text" id="remoteId" placeholder="ID друга (4 цифры)" maxlength="4" />
            
            <button class="glossy-btn" id="connectBtn" style="margin-bottom: 10px;">📞 Позвонить</button>
            <button class="glossy-btn" id="initMediaBtn" style="margin-bottom:10px;">🎥 Подключить камеру/микрофон</button>
            
            <div class="incoming-box" id="incomingCall">
                <p>📞 Входящий: <strong id="callerIdDisplay">...</strong></p>
                <div class="action-buttons">
                    <button class="glossy-btn green" id="answerBtn">Принять</button>
                    <button class="glossy-btn red" id="rejectBtn">Отклонить</button>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ЗВОНКА -->
        <div id="callScreen">
            <video id="remoteVideo" class="video-remote" autoplay playsinline></video>
            <video id="localVideo" class="video-local" autoplay muted playsinline></video>
            
            <div class="call-controls">
                <button class="glossy-btn" id="flipCamBtn" style="width: 50px;" title="Повернуть">🔄</button>
                <button class="glossy-btn red" id="leaveCallBtn" style="width: 150px;">Отключиться</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE ИНИЦИАЛИЗАЦИЯ ---
        const firebaseConfig = {
            apiKey: "AIzaSyB2_1QSx32s7EpymuHZ0UzmHur4sSEiTvQ",
            authDomain: "skype7q.firebaseapp.com",
            databaseURL: "https://skype7q-default-rtdb.firebaseio.com",
            projectId: "skype7q"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let myId = localStorage.getItem('my_skype_id');
        if (!myId) {
            myId = Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('my_skype_id', myId);
        }
        document.getElementById('myIdDisplay').textContent = myId;
        db.ref(`calls/${myId}`).remove(); 

        // --- 2. WEBRTC ПЕРЕМЕННЫЕ ---
        let localStream = null;
        let peerConnection = null;
        let inCall = false;
        let callRole = null; 
        let currentCallRef = null;
        let currentFacingMode = 'user';
        let incomingOfferData = null;

        const stunServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

        function updateStatus(msg, type = 'success') {
            const el = document.getElementById('status');
            el.textContent = msg; el.className = 'status ' + type;
        }

        // --- 3. ПОДКЛЮЧЕНИЕ КАМЕРЫ ---
        document.getElementById('initMediaBtn').onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true },
                    video: { facingMode: currentFacingMode }
                });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('localVideo').style.display = 'block';
                document.getElementById('initMediaBtn').textContent = '✅ Камера готова';
                updateStatus('Камера и микрофон готовы', 'success');
            } catch (e) {
                console.warn("Камера недоступна, пробуем звук");
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    document.getElementById('initMediaBtn').textContent = '🎤 Только звук';
                    updateStatus('Подключен только микрофон', 'warning');
                } catch (err) {
                    alert('Нет доступа к устройствам');
                }
            }
        };

        // --- 4. ПЕРЕВОРОТ КАМЕРЫ (С ФИКСАМИ) ---
        document.getElementById('flipCamBtn').onclick = async () => {
            if (!localStream) return;
            const oldVideoTrack = localStream.getVideoTracks()[0];
            if (oldVideoTrack) oldVideoTrack.stop();

            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';

            try {
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode }
                });
                const newVideoTrack = newStream.getVideoTracks()[0];

                localStream.removeTrack(oldVideoTrack);
                localStream.addTrack(newVideoTrack);
                document.getElementById('localVideo').srcObject = localStream;

                if (peerConnection) {
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) sender.replaceTrack(newVideoTrack);
                }

                // Визуально зеркалим только фронталку
                document.getElementById('localVideo').style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'none';
            } catch (e) {
                console.error("Ошибка поворота", e);
            }
        };

        // --- 5. СОЗДАНИЕ PEER CONNECTION ---
        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(stunServers);

            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                
                // Фикс: если камеры нет, говорим что готовы принимать видео
                if (localStream.getVideoTracks().length === 0) {
                    peerConnection.addTransceiver('video', { direction: 'recvonly' });
                }
            } else {
                peerConnection.addTransceiver('audio', { direction: 'recvonly' });
                peerConnection.addTransceiver('video', { direction: 'recvonly' });
            }

            peerConnection.ontrack = event => {
                const remoteVid = document.getElementById('remoteVideo');
                if (remoteVid.srcObject !== event.streams[0]) {
                    remoteVid.srcObject = event.streams[0];
                }
            };

            peerConnection.onicecandidate = event => {
                if (event.candidate && currentCallRef) {
                    currentCallRef.child('candidates').child(callRole).push(event.candidate.toJSON());
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    endCall();
                }
            };
        }

        // --- 6. ИСХОДЯЩИЙ ЗВОНОК ---
        document.getElementById('connectBtn').onclick = async () => {
            const remoteId = document.getElementById('remoteId').value.trim();
            if (!remoteId || remoteId === myId) return alert('Введите корректный ID');
            
            inCall = true;
            callRole = 'caller';
            updateStatus('Дозвон...', 'warning');
            
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('mainWindow').classList.add('in-call');
            document.getElementById('callScreen').style.display = 'flex';

            currentCallRef = db.ref(`calls/${remoteId}`);
            createPeerConnection();

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await currentCallRef.set({
                callerId: myId,
                offer: { type: offer.type, sdp: offer.sdp }
            });

            // Слушаем ответ
            currentCallRef.child('answer').on('value', async snapshot => {
                const answer = snapshot.val();
                if (answer && !peerConnection.currentRemoteDescription) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                }
            });

            // Слушаем ICE кандидатов собеседника
            currentCallRef.child('candidates').child('callee').on('child_added', snapshot => {
                const candidate = snapshot.val();
                if (candidate && peerConnection.remoteDescription) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                }
            });
            
            // Если сбросили на той стороне
            currentCallRef.on('value', snap => {
                if (!snap.exists() && inCall) endCall();
            });
        };

        // --- 7. ВХОДЯЩИЕ ЗВОНКИ ---
        db.ref(`calls/${myId}`).on('value', snapshot => {
            const data = snapshot.val();
            if (data && data.offer && !inCall) {
                incomingOfferData = data;
                document.getElementById('callerIdDisplay').textContent = data.callerId;
                document.getElementById('incomingCall').classList.add('active');
                updateStatus('Входящий вызов...', 'warning');
            } else if (!data) {
                document.getElementById('incomingCall').classList.remove('active');
                if (inCall && callRole === 'callee') endCall();
                if (!inCall) updateStatus('В сети. Ожидание вызовов...', 'success');
            }
        });

        document.getElementById('answerBtn').onclick = async () => {
            document.getElementById('incomingCall').classList.remove('active');
            inCall = true;
            callRole = 'callee';
            
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('mainWindow').classList.add('in-call');
            document.getElementById('callScreen').style.display = 'flex';

            currentCallRef = db.ref(`calls/${myId}`);
            createPeerConnection();

            await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOfferData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await currentCallRef.child('answer').set({ type: answer.type, sdp: answer.sdp });

            currentCallRef.child('candidates').child('caller').on('child_added', snapshot => {
                const candidate = snapshot.val();
                if (candidate) peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            });
        };

        document.getElementById('rejectBtn').onclick = () => {
            db.ref(`calls/${myId}`).remove();
            document.getElementById('incomingCall').classList.remove('active');
            updateStatus('В сети', 'success');
        };

        // --- 8. ЗАВЕРШЕНИЕ ЗВОНКА ---
        function endCall() {
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (currentCallRef) { currentCallRef.off(); currentCallRef.remove(); currentCallRef = null; }
            
            document.getElementById('remoteVideo').srcObject = null;
            inCall = false; callRole = null;

            document.getElementById('callScreen').style.display = 'none';
            document.getElementById('mainWindow').classList.remove('in-call');
            document.getElementById('menuScreen').style.display = 'flex';
            updateStatus('В сети. Ожидание вызовов...', 'success');
        }

        document.getElementById('leaveCallBtn').onclick = endCall;

    </script>
</body>
</html>
