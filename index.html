<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win7 Скайп (WebRTC 60FPS)</title>
    
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- СТИЛЬ WINDOWS 7 AERO GLASS --- */
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: radial-gradient(circle at 50% 100%, #2989D8 0%, #155A8A 50%, #00284F 100%);
            min-height: 100vh; height: 100dvh; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }
        
        .aero-window {
            width: 95%; max-width: 450px;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 25px rgba(255,255,255,0.7);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
        }

        .aero-window.expanded {
            max-width: 800px;
            width: 98%;
        }

        .title-bar {
            background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(220,220,220,0.3) 100%);
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            border-top-left-radius: 7px; border-top-right-radius: 7px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .title-bar .title {
            color: #000; font-size: 14px; font-weight: 600; text-shadow: 0 0 5px #fff, 0 0 10px #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .title-bar .controls { display: flex; gap: 4px; }
        
        .win-btn {
            width: 26px; height: 20px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5); cursor: pointer;
        }
        .win-btn.min { background: linear-gradient(to bottom, #f0f0f0, #ccc); }
        .win-btn.close { background: linear-gradient(to bottom, #faa 0%, #e33 50%, #c00 51%, #e33 100%); }

        .content-area {
            background: #fff;
            margin: 0 5px 5px 5px; border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.3);
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        h2 { color: #003399; font-size: 20px; margin-bottom: 20px; font-weight: 400; }
        
        .id-box { 
            background: #f0f4f8; padding: 15px; border-radius: 5px; margin-bottom: 20px; 
            width: 100%; border: 1px solid #cdd8e4; text-align: center;
        }
        .id-box p { color: #555; font-size: 13px; margin-bottom: 5px; }
        .my-id { font-size: 36px; color: #003399; letter-spacing: 3px; font-family: 'Consolas', monospace; }
        
        .status { 
            padding: 8px; border-radius: 3px; font-weight: 600; margin-bottom: 20px; 
            font-size: 13px; width: 100%; text-align: center; border: 1px solid transparent;
        }
        .status.success { background: #dff0d8; color: #3c763d; border-color: #d6e9c6; }
        .status.warning { background: #fcf8e3; color: #8a6d3b; border-color: #faebcc; }
        
        input {
            width: 100%; padding: 10px; border: 1px solid #abadb3; border-radius: 3px; font-size: 18px;
            text-align: center; margin-bottom: 15px; outline: none; background: #fff;
        }
        input:focus { border-color: #3399ff; box-shadow: 0 0 5px rgba(51,153,255,0.5); }
        
        /* Глянцевые кнопки Windows 7 */
        .glossy-btn {
            width: 100%; padding: 10px; border-radius: 3px; font-size: 14px; font-weight: 600;
            background: linear-gradient(to bottom, #f2f9fe 0%, #d6f0fd 49%, #bee6fd 50%, #a7d9f5 100%);
            border: 1px solid #7ebef7; color: #000; cursor: pointer; transition: 0.1s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .glossy-btn:hover { background: linear-gradient(to bottom, #e2f4fe 0%, #c6eafc 49%, #9edafb 50%, #87cbf3 100%); }
        .glossy-btn:active { background: linear-gradient(to bottom, #a7d9f5 0%, #bee6fd 49%, #d6f0fd 50%, #f2f9fe 100%); box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
        
        .glossy-btn.green {
            background: linear-gradient(to bottom, #f4fbf4 0%, #dcf0dc 49%, #c3e6c3 50%, #a8d9a8 100%);
            border-color: #7fbf7f;
        }
        .glossy-btn.red {
            background: linear-gradient(to bottom, #fbf4f4 0%, #f0dcdc 49%, #e6c3c3 50%, #d9a8a8 100%);
            border-color: #bf7f7f;
        }
        .glossy-btn.small { padding: 8px; font-size: 12px; }

        .incoming-box {
            display: none; background: #ffffcc; border: 1px solid #ffcc00;
            padding: 15px; border-radius: 3px; margin-top: 15px; width: 100%; text-align: center;
        }
        .incoming-box.active { display: block; }
        .incoming-box p { color: #333; font-size: 15px; margin-bottom: 10px; }
        .action-buttons { display: flex; gap: 5px; }

        /* --- ЭКРАН ЗВОНКА (ВИДЕО) --- */
        #callScreen { display: none; width: 100%; flex-direction: column; align-items: center; }
        
        .video-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 4px; overflow: hidden; border: 1px solid #000;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
            margin-bottom: 15px;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; background: #222; }
        
        #localVideo {
            position: absolute; bottom: 10px; right: 10px;
            width: 25%; max-width: 150px; aspect-ratio: 16/9;
            border: 2px solid rgba(255,255,255,0.8); border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 10;
            object-fit: cover; transform: scaleX(-1); /* Зеркально для селфи */
        }
        
        .call-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .call-controls .glossy-btn { margin: 0; }
        .full-width { grid-column: span 2; }
        
    </style>
</head>
<body>
    <div class="aero-window" id="mainWindow">
        <div class="title-bar">
            <div class="title">📱 Windows 7 Skype</div>
            <div class="controls">
                <button class="win-btn min"></button>
                <button class="win-btn close" onclick="window.close()"></button>
            </div>
        </div>
        
        <div class="content-area" id="menuScreen">
            <h2>Ваш профиль</h2>
            
            <div class="id-box">
                <p>Твой постоянный ID:</p>
                <div class="my-id" id="myIdDisplay">0000</div>
            </div>
            
            <div class="status success" id="status">В сети. Ожидание вызовов...</div>
            
            <input type="text" id="remoteId" placeholder="ID друга (4 цифры)" maxlength="4" />
            
            <button class="glossy-btn" id="connectBtn">📞 Позвонить (Видео)</button>
            
            <div class="incoming-box" id="incomingCall">
                <p>📞 Входящий: <strong id="callerIdDisplay">...</strong></p>
                <div class="action-buttons">
                    <button class="glossy-btn green" id="answerBtn">Принять</button>
                    <button class="glossy-btn red" id="rejectBtn">Отклонить</button>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ЗВОНКА -->
        <div class="content-area" id="callScreen">
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            
            <div class="call-controls">
                <button class="glossy-btn small" id="toggleCamBtn">📷 Выкл Камеру</button>
                <button class="glossy-btn small" id="toggleMicBtn">🎤 Выкл Микрофон</button>
                <button class="glossy-btn small full-width" id="screenShareBtn">🖥️ Демонстрация экрана (60 FPS)</button>
                <button class="glossy-btn red full-width" id="leaveCallBtn">☎️ Завершить вызов</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. НАСТРОЙКИ FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyB2_1QSx32s7EpymuHZ0UzmHur4sSEiTvQ",
            authDomain: "skype7q.firebaseapp.com",
            databaseURL: "https://skype7q-default-rtdb.firebaseio.com",
            projectId: "skype7q",
            storageBucket: "skype7q.firebasestorage.app",
            messagingSenderId: "4846139446",
            appId: "1:4846139446:web:f2b24c3da4d0887f3a8097"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // --- 2. WEBRTC & MEDIA ПЕРЕМЕННЫЕ ---
        let myId = localStorage.getItem('my_skype_id');
        if (!myId) {
            myId = Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('my_skype_id', myId);
        }
        document.getElementById('myIdDisplay').textContent = myId;
        
        let inCall = false;
        let activeRemoteId = null; 
        let peerConnection = null;
        let localStream = null;
        let screenStream = null;

        // Бесплатные STUN сервера от Google для пробивки NAT
        const pcConfig = {
            iceServers: [
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        // --- 3. ИНТЕРФЕЙС ---
        function updateStatus(msg, type = 'success') {
            const el = document.getElementById('status');
            el.textContent = msg; el.className = 'status ' + type;
        }

        // --- 4. ДОСТУП К КАМЕРЕ (ОБЫЧНОЙ) ---
        async function getLocalMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                return true;
            } catch (err) {
                alert("Нет доступа к камере или микрофону! Звонок будет только голосовой или вообще без медиа.");
                // Создаем пустой поток, чтобы WebRTC не падал
                localStream = new MediaStream();
                return false;
            }
        }

        // --- 5. ВХОДЯЩИЕ ЗВОНКИ (СЛУШАТЕЛЬ FIREBASE) ---
        // Сбрасываем старые зависшие звонки при загрузке
        db.ref(`calls/${myId}`).remove();

        db.ref(`calls/${myId}`).on('value', snapshot => {
            const data = snapshot.val();
            if (data && data.status === 'ringing') {
                if (inCall) { 
                    db.ref(`calls/${myId}`).update({ status: 'rejected' }); 
                    return; 
                }
                activeRemoteId = data.callerId;
                document.getElementById('callerIdDisplay').textContent = data.callerId;
                document.getElementById('incomingCall').classList.add('active');
                updateStatus('Входящий видеовызов...', 'warning');
            } else if (!data) {
                // Если звонок отменили или завершили
                if (inCall) hangup(false); // завершаем локально без удаления базы (уже удалена)
                document.getElementById('incomingCall').classList.remove('active');
                if (!inCall) updateStatus('В сети. Ожидание вызовов...', 'success');
            }
        });

        // --- 6. ИСХОДЯЩИЙ ЗВОНОК (CALLER) ---
        document.getElementById('connectBtn').onclick = async () => {
            const remoteId = document.getElementById('remoteId').value.trim();
            if (!remoteId || remoteId === myId) return alert('Введите корректный ID собеседника');
            
            updateStatus('Запрос доступа к камере...', 'warning');
            await getLocalMedia();
            
            inCall = true;
            activeRemoteId = remoteId;
            updateStatus('Дозвон...', 'warning');
            
            const btn = document.getElementById('connectBtn');
            btn.textContent = 'Отменить вызов';

            // Инициализация WebRTC
            initPeerConnection(remoteId, true);

            // Создаем Offer
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // Записываем в базу
                await db.ref(`calls/${remoteId}`).set({ 
                    callerId: myId, 
                    status: 'ringing',
                    offer: { type: offer.type, sdp: offer.sdp }
                });
            } catch(e) {
                console.error(e);
                hangup();
            }

            btn.onclick = () => {
                db.ref(`calls/${remoteId}`).remove(); 
                hangup();
                btn.textContent = '📞 Позвонить (Видео)'; 
                btn.onclick = arguments.callee;
            };

            // Слушаем ответ
            db.ref(`calls/${remoteId}`).on('value', snap => {
                const data = snap.val();
                if (data && data.status === 'answered' && data.answer) {
                    if (peerConnection.signalingState !== "stable") {
                        const remoteDesc = new RTCSessionDescription(data.answer);
                        peerConnection.setRemoteDescription(remoteDesc).catch(console.error);
                    }
                    switchToCallScreen();
                } else if (data && data.status === 'rejected') {
                    hangup();
                    btn.textContent = '📞 Позвонить (Видео)'; btn.onclick = arguments.callee;
                    updateStatus('Отклонено/Занято', 'warning');
                    setTimeout(() => updateStatus('В сети. Ожидание вызовов...', 'success'), 3000);
                } else if (!data && inCall) {
                    // Собеседник сбросил
                    hangup();
                }
            });

            // Слушаем ICE кандидаты собеседника
            db.ref(`calls/${remoteId}/calleeCandidates`).on('child_added', snap => {
                const candidate = new RTCIceCandidate(snap.val());
                peerConnection.addIceCandidate(candidate).catch(console.error);
            });
        };

        // --- 7. ПРИНЯТЬ / ОТКЛОНИТЬ (CALLEE) ---
        document.getElementById('answerBtn').onclick = async () => {
            document.getElementById('incomingCall').classList.remove('active');
            updateStatus('Подключение...', 'warning');
            
            await getLocalMedia();
            inCall = true;
            
            const callRef = db.ref(`calls/${myId}`);
            
            callRef.once('value', async snap => {
                const data = snap.val();
                if(!data || !data.offer) return hangup();

                initPeerConnection(myId, false);

                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);

                    await callRef.update({
                        status: 'answered',
                        answer: { type: answer.type, sdp: answer.sdp }
                    });

                    switchToCallScreen();
                } catch(e) {
                    console.error(e);
                    hangup();
                }
            });

            // Слушаем ICE кандидаты звонящего
            callRef.child('callerCandidates').on('child_added', snap => {
                const candidate = new RTCIceCandidate(snap.val());
                peerConnection.addIceCandidate(candidate).catch(console.error);
            });
        };

        document.getElementById('rejectBtn').onclick = () => {
            document.getElementById('incomingCall').classList.remove('active');
            db.ref(`calls/${myId}`).update({ status: 'rejected' });
            setTimeout(() => db.ref(`calls/${myId}`).remove(), 1000);
            updateStatus('В сети. Ожидание вызовов...', 'success');
        };

        // --- 8. ЯДРО WEBRTC ---
        function initPeerConnection(dbNodeId, isCaller) {
            peerConnection = new RTCPeerConnection(pcConfig);

            // Добавляем свои треки (Камера + Микрофон) в соединение
            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }

            // Получаем чужой поток
            peerConnection.ontrack = event => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };

            // Отправляем свои ICE кандидаты для пробивки NAT
            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    const candidatePath = isCaller ? 'callerCandidates' : 'calleeCandidates';
                    db.ref(`calls/${dbNodeId}/${candidatePath}`).push(event.candidate.toJSON());
                }
            };
        }

        // --- 9. УПРАВЛЕНИЕ ИНТЕРФЕЙСОМ И МЕДИА В ЗВОНКЕ ---
        function switchToCallScreen() {
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('mainWindow').classList.add('expanded');
        }

        document.getElementById('leaveCallBtn').onclick = () => hangup();

        function hangup(deleteDb = true) {
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
            
            inCall = false;
            peerConnection = null;

            if (deleteDb) {
                if (activeRemoteId) db.ref(`calls/${activeRemoteId}`).remove();
                db.ref(`calls/${myId}`).remove();
            }
            
            activeRemoteId = null;
            
            // Сброс UI
            document.getElementById('menuScreen').style.display = 'flex';
            document.getElementById('callScreen').style.display = 'none';
            document.getElementById('mainWindow').classList.remove('expanded');
            document.getElementById('connectBtn').textContent = '📞 Позвонить (Видео)';
            updateStatus('В сети. Ожидание вызовов...', 'success');
        }

        // --- 10. ТРАНСЛЯЦИЯ ЭКРАНА В 60 FPS ---
        document.getElementById('screenShareBtn').onclick = async () => {
            const btn = document.getElementById('screenShareBtn');
            const videoElement = document.getElementById('localVideo');

            if (screenStream) {
                // Если уже шарим - выключаем
                stopScreenShare();
                return;
            }

            try {
                // Запрашиваем экран на 60 FPS
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: { ideal: 60, max: 60 } },
                    audio: true // Захват системных звуков (если браузер поддерживает)
                });

                const screenTrack = screenStream.getVideoTracks()[0];
                
                // Подменяем трек видео в WebRTC соединении
                if (peerConnection) {
                    const senders = peerConnection.getSenders();
                    const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                    if (videoSender) {
                        videoSender.replaceTrack(screenTrack);
                    }
                }

                // Показываем в локальном окне и отключаем зеркальное отображение
                videoElement.srcObject = screenStream;
                videoElement.style.transform = 'none';

                btn.textContent = '⏹️ Остановить демонстрацию';
                btn.classList.add('red');

                // Если пользователь нажал "Остановить" в системном UI браузера
                screenTrack.onended = () => stopScreenShare();

            } catch (err) {
                alert('Ошибка демонстрации экрана. Возможно, вы используете мобильное устройство или запретили доступ: ' + err.message);
            }
        };

        function stopScreenShare() {
            if (!screenStream) return;
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;

            const videoElement = document.getElementById('localVideo');
            const btn = document.getElementById('screenShareBtn');
            
            // Возвращаем камеру
            if (localStream && peerConnection) {
                const camTrack = localStream.getVideoTracks()[0];
                const senders = peerConnection.getSenders();
                const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                if (videoSender && camTrack) {
                    videoSender.replaceTrack(camTrack);
                }
                videoElement.srcObject = localStream;
                videoElement.style.transform = 'scaleX(-1)'; // Снова зеркалим камеру
            }

            btn.textContent = '🖥️ Демонстрация экрана (60 FPS)';
            btn.classList.remove('red');
        }

        // --- 11. КНОПКИ КАМЕРЫ И МИКРОФОНА ---
        document.getElementById('toggleCamBtn').onclick = (e) => {
            if(!localStream) return;
            const videoTrack = localStream.getVideoTracks()[0];
            if(videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                e.target.textContent = videoTrack.enabled ? '📷 Выкл Камеру' : '📸 Вкл Камеру';
                e.target.classList.toggle('red', !videoTrack.enabled);
            }
        };

        document.getElementById('toggleMicBtn').onclick = (e) => {
            if(!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            if(audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                e.target.textContent = audioTrack.enabled ? '🎤 Выкл Микрофон' : '🎙️ Вкл Микрофон';
                e.target.classList.toggle('red', !audioTrack.enabled);
            }
        };
    </script>
</body>
</html>
