<script>
    // --- 1. FIREBASE ИНИЦИАЛИЗАЦИЯ ---
    const firebaseConfig = {
        apiKey: "AIzaSyB2_1QSx32s7EpymuHZ0UzmHur4sSEiTvQ",
        authDomain: "skype7q.firebaseapp.com",
        databaseURL: "https://skype7q-default-rtdb.firebaseio.com",
        projectId: "skype7q"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let myId = localStorage.getItem('my_skype_id');
    if (!myId) {
        myId = Math.floor(1000 + Math.random() * 9000).toString();
        localStorage.setItem('my_skype_id', myId);
    }
    document.getElementById('myIdDisplay').textContent = myId;
    db.ref(`calls/${myId}`).remove(); 

    // --- 2. ВЕЧНЫЕ ПОТОКИ ---
    const localStream = new MediaStream();
    const remoteStream = new MediaStream();
    
    document.getElementById('localVideo').srcObject = localStream;
    document.getElementById('remoteVideo').srcObject = remoteStream;

    let peerConnection = null;
    let inCall = false;
    let callRole = null; 
    let currentCallRef = null;
    let incomingOfferData = null;
    
    let isAudioEnabled = true;
    let isVideoEnabled = true;
    let isScreenSharing = false;
    let isPipVisible = true;
    let savedCameraTrack = null; 
    let currentFacingMode = 'user';

    const stunServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

    function updateStatus(msg, type = 'success') {
        const el = document.getElementById('status');
        el.textContent = msg; el.className = 'status ' + type;
    }

    function updateTransceivers() {
        if (!peerConnection) return;
        const audioTrack = localStream.getAudioTracks()[0] || null;
        const videoTrack = localStream.getVideoTracks()[0] || null;

        const audioTransceiver = peerConnection.getTransceivers().find(t => t.receiver.track.kind === 'audio');
        if (audioTransceiver) audioTransceiver.sender.replaceTrack(audioTrack);
        
        const videoTransceiver = peerConnection.getTransceivers().find(t => t.receiver.track.kind === 'video');
        if (videoTransceiver) videoTransceiver.sender.replaceTrack(videoTrack);
    }

    // --- 3. ИНИЦИАЛИЗАЦИЯ МЕДИА И ОПТИМИЗАЦИЯ ---
    async function getDevices() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoSelect = document.getElementById('videoSource');
            const audioSelect = document.getElementById('audioSource');
            const prevVideo = videoSelect.value;
            const prevAudio = audioSelect.value;
            
            videoSelect.innerHTML = ''; audioSelect.innerHTML = '';
            
            devices.forEach(device => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                if (device.kind === 'videoinput') {
                    option.text = device.label || `Камера ${videoSelect.length + 1}`;
                    videoSelect.appendChild(option);
                } else if (device.kind === 'audioinput') {
                    option.text = device.label || `Микрофон ${audioSelect.length + 1}`;
                    audioSelect.appendChild(option);
                }
            });
            if (prevVideo) videoSelect.value = prevVideo;
            if (prevAudio) audioSelect.value = prevAudio;
            
            const panel = document.getElementById('settingsPanel');
            if (panel.style.display !== 'block') {
                panel.style.display = 'block';
            }
        } catch (e) {
            console.error("Ошибка получения устройств", e);
        }
    }

    async function startMedia() {
        const videoId = document.getElementById('videoSource').value;
        const audioId = document.getElementById('audioSource').value;
        
        localStream.getTracks().forEach(t => t.stop());
        localStream.getTracks().forEach(t => localStream.removeTrack(t));

        // ОПТИМИЗАЦИЯ: Жесткие лимиты на разрешение и FPS, чтобы не вешать браузер
        let constraints = {
            audio: audioId ? { deviceId: { exact: audioId }, echoCancellation: true, noiseSuppression: true } : { echoCancellation: true, noiseSuppression: true },
            video: videoId 
                ? { deviceId: { exact: videoId }, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30, max: 30 } } 
                : { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30, max: 30 } }
        };

        try {
            const newStream = await navigator.mediaDevices.getUserMedia(constraints);
            
            newStream.getTracks().forEach(t => {
                if (t.kind === 'video') {
                    t.contentHint = 'motion'; // ОПТИМИЗАЦИЯ: Делаем видео с камеры максимально плавным
                }
                localStream.addTrack(t);
            });
            
            document.getElementById('localVideo').style.display = isPipVisible && !isScreenSharing ? 'block' : 'none';
            
            localStream.getAudioTracks().forEach(t => t.enabled = isAudioEnabled);
            localStream.getVideoTracks().forEach(t => t.enabled = isVideoEnabled);
            
            updateTransceivers();

            document.getElementById('localVideo').style.transform = (!videoId && currentFacingMode === 'user') ? 'scaleX(-1)' : 'none';
            updateStatus('Устройства успешно подключены', 'success');
            
            if (document.getElementById('videoSource').options.length === 0) {
                await getDevices();
            }
        } catch (e) {
            console.warn("Камера недоступна или занята, пробуем только звук", e);
            try {
                const audioStream = await navigator.mediaDevices.getUserMedia({ audio: audioId ? { deviceId: { exact: audioId } } : true, video: false });
                
                audioStream.getTracks().forEach(t => localStream.addTrack(t));
                updateTransceivers();
                
                updateStatus('Подключен только микрофон', 'warning');
                if (document.getElementById('videoSource').options.length === 0) await getDevices();
            } catch (err) {
                alert('Нет доступа к устройствам');
            }
        }
    }

    document.getElementById('initMediaBtn').onclick = async () => {
        const panel = document.getElementById('settingsPanel');
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
        } else {
            await startMedia();
        }
    };

    document.getElementById('applySettingsBtn').onclick = () => {
        if (isScreenSharing) {
            alert("Остановите трансляцию экрана для смены камеры");
            return;
        }
        startMedia();
    };

    // --- 4. УПРАВЛЕНИЕ ВО ВРЕМЯ ЗВОНКА ---
    document.getElementById('toggleMicBtn').onclick = () => {
        if (localStream.getAudioTracks().length > 0) {
            isAudioEnabled = !isAudioEnabled;
            localStream.getAudioTracks()[0].enabled = isAudioEnabled;
            document.getElementById('toggleMicBtn').classList.toggle('off', !isAudioEnabled);
        }
    };

    document.getElementById('toggleCamBtn').onclick = () => {
        if (localStream.getVideoTracks().length > 0) {
            isVideoEnabled = !isVideoEnabled;
            localStream.getVideoTracks()[0].enabled = isVideoEnabled;
            document.getElementById('toggleCamBtn').classList.toggle('off', !isVideoEnabled);
        }
    };

    document.getElementById('flipCamBtn').onclick = async () => {
        if (isScreenSharing) return alert("Остановите показ экрана");
        document.getElementById('videoSource').value = ''; 
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
        await startMedia();
    };

    document.getElementById('togglePipBtn').onclick = () => {
        isPipVisible = !isPipVisible;
        if (!isScreenSharing) {
            document.getElementById('localVideo').style.display = isPipVisible ? 'block' : 'none';
        }
        document.getElementById('togglePipBtn').classList.toggle('off', !isPipVisible);
    };

    document.getElementById('fullscreenBtn').onclick = () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => console.log(err));
            document.getElementById('fullscreenBtn').classList.add('off');
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
                document.getElementById('fullscreenBtn').classList.remove('off');
            }
        }
    };

    // Логика захвата экрана
    async function startScreenShareLogic() {
        if (isScreenSharing) return true;
        try {
            // ОПТИМИЗАЦИЯ: Захватываем экран с нормальным FPS
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: { ideal: 30, max: 30 } } });
            const screenTrack = screenStream.getVideoTracks()[0];
            screenTrack.contentHint = 'detail'; // Подсказка для браузера - держать качество текста
            
            savedCameraTrack = localStream.getVideoTracks()[0]; 
            
            if (savedCameraTrack) {
                localStream.removeTrack(savedCameraTrack); 
            }
            localStream.addTrack(screenTrack); 
            
            updateTransceivers();
            
            // ИСПРАВЛЕНИЕ ЗАВИСШЕГО PiP: Полностью скрываем маленькое окошко на время трансляции
            document.getElementById('localVideo').style.display = 'none'; 
            document.getElementById('localVideo').style.transform = 'none'; 
            
            isScreenSharing = true;
            document.getElementById('shareScreenBtn').classList.add('off'); 
            
            screenTrack.onended = () => stopScreenShare();
            return true;
        } catch (e) {
            console.error("Трансляция экрана отменена", e);
            return false;
        }
    }

    document.getElementById('shareScreenBtn').onclick = async () => {
        if (isScreenSharing) {
            stopScreenShare();
        } else {
            await startScreenShareLogic();
        }
    };

    function stopScreenShare() {
        if (!isScreenSharing) return;
        
        const currentVideoTrack = localStream.getVideoTracks()[0];
        if (currentVideoTrack) {
            currentVideoTrack.stop();
            localStream.removeTrack(currentVideoTrack);
        }
        
        if (savedCameraTrack) {
            localStream.addTrack(savedCameraTrack);
            savedCameraTrack = null;
            const videoId = document.getElementById('videoSource').value;
            document.getElementById('localVideo').style.transform = (!videoId && currentFacingMode === 'user') ? 'scaleX(-1)' : 'none';
        }
        
        updateTransceivers();
        
        // ИСПРАВЛЕНИЕ ЗАВИСШЕГО PiP: Возвращаем окошко обратно (если оно не было выключено кнопкой)
        document.getElementById('localVideo').style.display = isPipVisible ? 'block' : 'none';
        
        isScreenSharing = false;
        document.getElementById('shareScreenBtn').classList.remove('off');
    }

    // --- 5. СОЗДАНИЕ PEER CONNECTION ---
    function createPeerConnection() {
        peerConnection = new RTCPeerConnection(stunServers);

        peerConnection.addTransceiver('audio', { direction: 'sendrecv' });
        peerConnection.addTransceiver('video', { direction: 'sendrecv' });

        updateTransceivers();

        peerConnection.ontrack = event => {
            if (!remoteStream.getTracks().includes(event.track)) {
                remoteStream.addTrack(event.track);
            }
            
            const remoteVid = document.getElementById('remoteVideo');
            if (remoteVid.paused) {
                remoteVid.play().catch(e => console.warn(e));
            }
        };

        peerConnection.onicecandidate = event => {
            if (event.candidate && currentCallRef) {
                currentCallRef.child('candidates').child(callRole).push(event.candidate.toJSON());
            }
        };

        peerConnection.onconnectionstatechange = () => {
            if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                endCall();
            }
        };
    }

    // --- 6. ИСХОДЯЩИЙ ЗВОНОК ---
    async function initiateCall(withScreenShare) {
        const remoteId = document.getElementById('remoteId').value.trim();
        if (!remoteId || remoteId === myId) return alert('Введите корректный ID');

        if (withScreenShare) {
            const success = await startScreenShareLogic();
            if (!success) return; 
        }
        
        inCall = true; callRole = 'caller';
        updateStatus('Дозвон...', 'warning');
        
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('mainWindow').classList.add('in-call');
        document.getElementById('callScreen').style.display = 'flex';

        currentCallRef = db.ref(`calls/${remoteId}`);
        createPeerConnection();

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        await currentCallRef.set({ callerId: myId, offer: { type: offer.type, sdp: offer.sdp } });

        // ✅ ДОБАВЛЯЕМ ОЧЕРЕДЬ ДЛЯ КАНДИДАТОВ
        let iceQueue = [];

        currentCallRef.child('answer').on('value', async snapshot => {
            const answer = snapshot.val();
            if (answer && !peerConnection.currentRemoteDescription) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                
                // ✅ КАК ТОЛЬКО ПОЛУЧИЛИ ANSWER, ПРИМЕНЯЕМ ВСЕХ ЖДУЩИХ КАНДИДАТОВ
                while (iceQueue.length > 0) {
                    peerConnection.addIceCandidate(iceQueue.shift()).catch(e => console.error("ICE error:", e));
                }
            }
        });

        currentCallRef.child('candidates').child('callee').on('child_added', snapshot => {
            const candidate = snapshot.val();
            if (candidate) {
                const rtcCandidate = new RTCIceCandidate(candidate);
                if (peerConnection.remoteDescription) {
                    // Если ответ уже есть, применяем сразу
                    peerConnection.addIceCandidate(rtcCandidate).catch(e => console.error("ICE error:", e));
                } else {
                    // Если ответа еще нет, кидаем в очередь
                    iceQueue.push(rtcCandidate);
                }
            }
        });
        
        currentCallRef.on('value', snap => {
            if (!snap.exists() && inCall) endCall();
        });
    }

    document.getElementById('connectBtn').onclick = () => initiateCall(false);
    document.getElementById('connectScreenBtn').onclick = () => initiateCall(true);

    // --- 7. ВХОДЯЩИЕ ЗВОНКИ ---
    db.ref(`calls/${myId}`).on('value', snapshot => {
        const data = snapshot.val();
        if (data && data.offer && !inCall) {
            incomingOfferData = data;
            document.getElementById('callerIdDisplay').textContent = data.callerId;
            document.getElementById('incomingCall').classList.add('active');
            updateStatus('Входящий вызов...', 'warning');
        } else if (!data) {
            document.getElementById('incomingCall').classList.remove('active');
            if (inCall && callRole === 'callee') {
                endCall();
            } else if (!inCall) {
                updateStatus('В сети. Ожидание вызовов...', 'success');
            }
        }
    });

    document.getElementById('answerBtn').onclick = async () => {
        document.getElementById('incomingCall').classList.remove('active');
        inCall = true; callRole = 'callee';
        
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('mainWindow').classList.add('in-call');
        document.getElementById('callScreen').style.display = 'flex';

        currentCallRef = db.ref(`calls/${myId}`);
        createPeerConnection();

        await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOfferData.offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        await currentCallRef.child('answer').set({ type: answer.type, sdp: answer.sdp });

        currentCallRef.child('candidates').child('caller').on('child_added', snapshot => {
            const candidate = snapshot.val();
            if (candidate) peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });
    };

    document.getElementById('rejectBtn').onclick = () => {
        db.ref(`calls/${myId}`).remove();
        document.getElementById('incomingCall').classList.remove('active');
        updateStatus('В сети', 'success');
    };

    // --- 8. ЗАВЕРШЕНИЕ ЗВОНКА ---
    function endCall() {
        if (isScreenSharing) stopScreenShare();
        
        if (document.fullscreenElement) {
            document.exitFullscreen().catch(e => console.log(e));
            document.getElementById('fullscreenBtn').classList.remove('off');
        }
        
        if (peerConnection) { 
            peerConnection.onicecandidate = null;
            peerConnection.ontrack = null;
            peerConnection.onconnectionstatechange = null;
            peerConnection.close(); 
            peerConnection = null; 
        }
        
        if (currentCallRef) { 
            currentCallRef.child('answer').off();
            currentCallRef.child('candidates').child('callee').off();
            currentCallRef.child('candidates').child('caller').off();
            currentCallRef.off(); 
            currentCallRef.remove(); 
            currentCallRef = null; 
        }
        
        remoteStream.getTracks().forEach(t => remoteStream.removeTrack(t));
        
        inCall = false; 
        callRole = null; 
        incomingOfferData = null;

        document.getElementById('callScreen').style.display = 'none';
        document.getElementById('mainWindow').classList.remove('in-call');
        document.getElementById('menuScreen').style.display = 'flex';
        updateStatus('В сети. Ожидание вызовов...', 'success');
    }

    document.getElementById('leaveCallBtn').onclick = endCall;

</script>
