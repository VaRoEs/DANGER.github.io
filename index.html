<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 Мобильный Скайп (Metered SDK)</title>
    
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Подключаем Metered SDK -->
    <script src="https://cdn.metered.ca/sdk/frame/1.4.3/sdk-frame.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background: #000; min-height: 100vh; height: 100dvh; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }
        
        .app-container {
            width: 100vw; height: 100vh; height: 100dvh;
            background: #0f172a; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #menuScreen {
            padding: 30px 20px; text-align: center; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            max-width: 500px; margin: 0 auto; width: 100%;
        }
        h1 { color: #fff; font-size: 28px; margin-bottom: 30px; }
        
        .id-box { background: #1e293b; padding: 25px; border-radius: 20px; margin-bottom: 25px; width: 100%; border: 1px solid #334155; }
        .id-box p { color: #94a3b8; font-size: 14px; margin-bottom: 5px; }
        .my-id { font-size: 48px; font-weight: bold; color: #38bdf8; letter-spacing: 5px; }
        
        .status { padding: 12px; border-radius: 10px; color: #fff; font-weight: 500; margin-bottom: 25px; font-size: 15px; background: rgba(255,255,255,0.1); width: 100%; }
        .status.success { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .status.warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        
        input {
            width: 100%; padding: 20px; border: none; border-radius: 15px; font-size: 20px;
            background: #1e293b; color: white; text-align: center; margin-bottom: 15px; outline: none;
            border: 2px solid transparent; transition: 0.3s;
        }
        input:focus { border-color: #38bdf8; }
        input::placeholder { color: #475569; }
        
        .btn-call {
            width: 100%; padding: 20px; border: none; border-radius: 15px; font-size: 20px; font-weight: bold;
            background: #22c55e; color: white; cursor: pointer; transition: 0.2s;
        }
        .btn-call:active { transform: scale(0.95); }
        
        .incoming-box {
            display: none; background: rgba(56, 189, 248, 0.1); border: 2px solid #38bdf8;
            padding: 20px; border-radius: 20px; margin-top: 30px; width: 100%; animation: pulse 1.5s infinite;
        }
        .incoming-box.active { display: block; }
        .incoming-box p { color: white; font-size: 18px; margin-bottom: 15px; }
        .action-buttons { display: flex; gap: 10px; }
        .btn-answer { background: #22c55e; flex: 1; padding: 15px; border-radius: 12px; border: none; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-reject { background: #ef4444; flex: 1; padding: 15px; border-radius: 12px; border: none; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* --- ЭКРАН ЗВОНКА (METERED FRAME) --- */
        #callScreen {
            display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #000;
        }
        
        #metered-frame {
            width: 100%; height: 100%; border: none;
        }

        .btn-leave-wrapper {
            position: absolute; top: 20px; right: 20px;
            background: #ef4444; color: white; padding: 12px 20px;
            border-radius: 12px; font-weight: bold; font-size: 14px;
            border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 9999; transition: 0.2s;
        }
        .btn-leave-wrapper:active { transform: scale(0.95); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="menuScreen">
            <h1>Видеочат</h1>
            
            <div class="id-box">
                <p>Твой постоянный ID:</p>
                <div class="my-id" id="myIdDisplay">0000</div>
            </div>
            
            <div class="status success" id="status">🔥 В сети. Ожидание вызовов...</div>
            
            <input type="text" id="remoteId" placeholder="ID друга (4 цифры)" maxlength="4" />
            <button class="btn-call" id="connectBtn">Позвонить</button>
            
            <!-- Уведомление о входящем звонке -->
            <div class="incoming-box" id="incomingCall">
                <p>📞 Входящий вызов: <strong id="callerIdDisplay">...</strong></p>
                <div class="action-buttons">
                    <button class="btn-answer" id="answerBtn">Принять</button>
                    <button class="btn-reject" id="rejectBtn">Отклонить</button>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ЗВОНКА (Здесь работает Metered) -->
        <div id="callScreen">
            <div id="metered-frame"></div>
            <!-- Кнопка поверх видеочата, чтобы вернуться назад -->
            <button class="btn-leave-wrapper" id="leaveCallBtn">Выйти из звонка</button>
        </div>

    </div>
    
    <script>
        // --- 1. НАСТРОЙКИ FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyB2_1QSx32s7EpymuHZ0UzmHur4sSEiTvQ",
            authDomain: "skype7q.firebaseapp.com",
            databaseURL: "https://skype7q-default-rtdb.firebaseio.com",
            projectId: "skype7q",
            storageBucket: "skype7q.firebasestorage.app",
            messagingSenderId: "4846139446",
            appId: "1:4846139446:web:f2b24c3da4d0887f3a8097",
            measurementId: "G-7L0F495NGJ"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // --- 2. ГЕНЕРАЦИЯ ID ---
        let myId = localStorage.getItem('my_skype_id');
        if (!myId) {
            myId = Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('my_skype_id', myId);
        }
        document.getElementById('myIdDisplay').textContent = myId;

        // --- 3. ЛОГИКА ИНТЕРФЕЙСА ---
        function updateStatus(msg, type = '') {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        let currentCallRef = null;

        // СЛУШАЕМ ВХОДЯЩИЕ ЗВОНКИ
        db.ref(`calls/${myId}`).on('value', snapshot => {
            const data = snapshot.val();
            
            // Если нам звонят
            if (data && data.status === 'ringing') {
                document.getElementById('callerIdDisplay').textContent = data.callerId;
                document.getElementById('incomingCall').classList.add('active');
            } 
            // Если звонящий сбросил вызов
            else if (data && data.status === 'hangup') {
                document.getElementById('incomingCall').classList.remove('active');
                updateStatus('Звонок отменен', 'warning');
                setTimeout(() => updateStatus('🔥 В сети. Ожидание вызовов...', 'success'), 2000);
                db.ref(`calls/${myId}`).remove();
            }
        });

        // КНОПКА "ПОЗВОНИТЬ"
        document.getElementById('connectBtn').onclick = () => {
            const remoteId = document.getElementById('remoteId').value.trim();
            if (!remoteId || remoteId === myId || remoteId.length !== 4) {
                return alert('Введи 4 цифры ID друга');
            }
            
            updateStatus('Звоним...', 'warning');
            
            // Отправляем сигнал звонка в базу друга
            currentCallRef = db.ref(`calls/${remoteId}`);
            currentCallRef.set({ callerId: myId, status: 'ringing' });

            // Слушаем, ответит друг или отклонит
            currentCallRef.on('value', snapshot => {
                const data = snapshot.val();
                if (data && data.status === 'answered') {
                    // Друг ответил — запускаем видео
                    currentCallRef.off();
                    startMeteredCall();
                } else if (data && data.status === 'rejected') {
                    // Друг сбросил
                    currentCallRef.off();
                    updateStatus('Вызов отклонен', 'warning');
                    setTimeout(() => updateStatus('🔥 В сети. Ожидание вызовов...', 'success'), 3000);
                }
            });
        };

        // КНОПКА "ПРИНЯТЬ" (Для входящих)
        document.getElementById('answerBtn').onclick = () => {
            document.getElementById('incomingCall').classList.remove('active');
            // Сообщаем звонящему, что мы приняли вызов
            db.ref(`calls/${myId}`).update({ status: 'answered' });
            startMeteredCall(); // Запускаем видео
        };

        // КНОПКА "ОТКЛОНИТЬ" (Для входящих)
        document.getElementById('rejectBtn').onclick = () => {
            document.getElementById('incomingCall').classList.remove('active');
            // Сообщаем звонящему об отказе и чистим базу
            db.ref(`calls/${myId}`).update({ status: 'rejected' });
            setTimeout(() => db.ref(`calls/${myId}`).remove(), 1000);
        };

        // --- 4. ЗАПУСК METERED SDK ---
        function startMeteredCall() {
            // Прячем меню, показываем экран звонка
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('callScreen').style.display = 'block';
            
            // Инициализируем Metered Frame (он сам запросит камеру и микрофон)
            var frame = new MeteredFrame(); 
            frame.init({
                roomURL: "skype777.metered.live/78", // Твоя комната
            }, document.getElementById("metered-frame"));
        }

        // --- 5. ВЫХОД ИЗ ЗВОНКА ---
        // Самый надежный способ очистить сессию Metered и вернуть UI — перезагрузить страницу
        document.getElementById('leaveCallBtn').onclick = () => {
            window.location.reload(); 
        };

    </script>
</body>
</html>
