<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win7 Скайп (Native WebRTC)</title>
    
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- СТИЛЬ WINDOWS 7 AERO GLASS --- */
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            /* Имитация обоев Windows 7 */
            background: radial-gradient(circle at 50% 100%, #2989D8 0%, #155A8A 50%, #00284F 100%);
            min-height: 100vh; height: 100dvh; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }
        
        .aero-window {
            width: 95%; max-width: 450px;
            /* Эффект стекла */
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 25px rgba(255,255,255,0.7);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            display: flex; flex-direction: column;
            z-index: 10;
        }

        .title-bar {
            background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(220,220,220,0.3) 100%);
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            border-top-left-radius: 7px; border-top-right-radius: 7px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .title-bar .title {
            color: #000; font-size: 14px; font-weight: 600; text-shadow: 0 0 5px #fff, 0 0 10px #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .title-bar .controls {
            display: flex; gap: 4px;
        }
        .win-btn {
            width: 26px; height: 20px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5); cursor: pointer;
        }
        .win-btn.close {
            background: linear-gradient(to bottom, #faa 0%, #e33 50%, #c00 51%, #e33 100%);
        }

        .content-area {
            background: #fff;
            margin: 0 5px 5px 5px; border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.3);
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        h2 { color: #003399; font-size: 20px; margin-bottom: 20px; font-weight: 400; }
        
        .id-box { 
            background: #f0f4f8; padding: 15px; border-radius: 5px; margin-bottom: 20px; 
            width: 100%; border: 1px solid #cdd8e4; text-align: center;
        }
        .id-box p { color: #555; font-size: 13px; margin-bottom: 5px; }
        .my-id { font-size: 36px; color: #003399; letter-spacing: 3px; font-family: 'Consolas', monospace; }
        
        .status { 
            padding: 8px; border-radius: 3px; font-weight: 600; margin-bottom: 20px; 
            font-size: 13px; width: 100%; text-align: center; border: 1px solid transparent;
        }
        .status.success { background: #dff0d8; color: #3c763d; border-color: #d6e9c6; }
        .status.warning { background: #fcf8e3; color: #8a6d3b; border-color: #faebcc; }
        
        input {
            width: 100%; padding: 10px; border: 1px solid #abadb3; border-radius: 3px; font-size: 18px;
            text-align: center; margin-bottom: 15px; outline: none; background: #fff;
        }
        input:focus { border-color: #3399ff; box-shadow: 0 0 5px rgba(51,153,255,0.5); }
        
        /* Глянцевые кнопки Windows 7 */
        .glossy-btn {
            width: 100%; padding: 10px; border-radius: 3px; font-size: 15px;
            background: linear-gradient(to bottom, #f2f9fe 0%, #d6f0fd 49%, #bee6fd 50%, #a7d9f5 100%);
            border: 1px solid #7ebef7; color: #000; cursor: pointer; transition: 0.1s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.1);
            font-weight: 600;
        }
        .glossy-btn:hover { background: linear-gradient(to bottom, #e2f4fe 0%, #c6eafc 49%, #9edafb 50%, #87cbf3 100%); }
        .glossy-btn:active { background: linear-gradient(to bottom, #a7d9f5 0%, #bee6fd 49%, #d6f0fd 50%, #f2f9fe 100%); box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
        
        .glossy-btn.green {
            background: linear-gradient(to bottom, #f4fbf4 0%, #dcf0dc 49%, #c3e6c3 50%, #a8d9a8 100%);
            border-color: #7fbf7f;
        }
        .glossy-btn.red {
            background: linear-gradient(to bottom, #fbf4f4 0%, #f0dcdc 49%, #e6c3c3 50%, #d9a8a8 100%);
            border-color: #bf7f7f;
        }

        .incoming-box {
            display: none; background: #ffffcc; border: 1px solid #ffcc00;
            padding: 15px; border-radius: 3px; margin-top: 15px; width: 100%; text-align: center;
        }
        .incoming-box.active { display: block; }
        .incoming-box p { color: #333; font-size: 15px; margin-bottom: 10px; }
        .action-buttons { display: flex; gap: 5px; }

        /* --- ЭКРАН ЗВОНКА (NATIVE WEBRTC) --- */
        #callScreen {
            display: none; width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; background: #000; z-index: 20;
        }
        
        .video-remote {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; z-index: 1; background: #111;
        }
        
        .video-local {
            position: absolute; bottom: 80px; right: 20px; width: 100px; height: 140px;
            object-fit: cover; border-radius: 5px; background: #222; border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 5px 15px rgba(0,0,0,0.7); transform: scaleX(-1); z-index: 5;
        }
        
        #jpeg-screen-viewer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; background: #000; z-index: 15; display: none;
        }

        .call-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
            background: rgba(255,255,255,0.3); padding: 10px; border-radius: 10px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="aero-window" id="mainWindow">
        <div class="title-bar">
            <div class="title">📱 Windows 7 Skype</div>
            <div class="controls">
                <button class="win-btn" style="background: linear-gradient(to bottom, #f0f0f0, #ccc);"></button>
                <button class="win-btn close" onclick="window.close()"></button>
            </div>
        </div>
        
        <div class="content-area" id="menuScreen">
            <h2>Ваш профиль</h2>
            
            <div class="id-box">
                <p>Твой постоянный ID:</p>
                <div class="my-id" id="myIdDisplay">0000</div>
            </div>
            
            <div class="status success" id="status">В сети. Ожидание вызовов...</div>
            
            <input type="text" id="remoteId" placeholder="ID друга (4 цифры)" maxlength="4" />
            
            <button class="glossy-btn" id="connectBtn" style="margin-bottom: 10px;">📞 Позвонить</button>
            <button class="glossy-btn" id="jpegShareBtn" style="font-size: 13px;">🖥️ Поделиться экраном (JPEG)</button>
            
            <div class="incoming-box" id="incomingCall">
                <p>📞 Входящий: <strong id="callerIdDisplay">...</strong></p>
                <div class="action-buttons">
                    <button class="glossy-btn green" id="answerBtn">Принять</button>
                    <button class="glossy-btn red" id="rejectBtn">Отклонить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ЗВОНКА -->
    <div id="callScreen">
        <video id="remoteVideo" class="video-remote" autoplay playsinline></video>
        <video id="localVideo" class="video-local" autoplay muted playsinline></video>
        
        <img id="jpeg-screen-viewer" alt="Трансляция экрана" />
        
        <div class="call-controls">
            <button class="glossy-btn red" id="leaveCallBtn" style="width: 120px;">Завершить</button>
        </div>
    </div>

    <script>
        // --- 1. НАСТРОЙКИ FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyB2_1QSx32s7EpymuHZ0UzmHur4sSEiTvQ",
            authDomain: "skype7q.firebaseapp.com",
            databaseURL: "https://skype7q-default-rtdb.firebaseio.com",
            projectId: "skype7q",
            storageBucket: "skype7q.firebasestorage.app",
            messagingSenderId: "4846139446",
            appId: "1:4846139446:web:f2b24c3da4d0887f3a8097"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // --- 2. ИДЕНТИФИКАЦИЯ ---
        let myId = localStorage.getItem('my_skype_id');
        if (!myId) {
            myId = Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('my_skype_id', myId);
        }
        document.getElementById('myIdDisplay').textContent = myId;
        
        // Очистка при загрузке
        db.ref(`calls/${myId}`).remove(); 
        db.ref(`webrtc/${myId}`).remove();

        // --- 3. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ WEBRTC ---
        let localStream = null;
        let peerConnection = null;
        let activeRemoteId = null; 
        let iceCandidatesQueue = [];

        const STUN_SERVERS = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // --- 4. ИНТЕРФЕЙС И МЕДИА ---
        function updateStatus(msg, type = 'success') {
            const el = document.getElementById('status');
            el.textContent = msg; el.className = 'status ' + type;
        }

        async function startMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
            } catch (e) {
                console.warn("Нет камеры, пробуем только звук");
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    document.getElementById('localVideo').style.display = 'none';
                } catch (err) {
                    console.error("Нет доступа к медиа вообще");
                }
            }
        }

        function showCallUI() {
            document.getElementById('mainWindow').style.display = 'none';
            document.getElementById('callScreen').style.display = 'block';
            
            // Слушаем JPEG-трансляцию экрана от собеседника
            if (activeRemoteId) {
                db.ref(`screenshares/${activeRemoteId}`).on('value', snap => {
                    const data = snap.val();
                    const viewer = document.getElementById('jpeg-screen-viewer');
                    if(data && data.img) {
                        viewer.src = data.img;
                        viewer.style.display = 'block';
                    } else {
                        viewer.style.display = 'none';
                    }
                });
            }
        }

        // --- 5. ЛОГИКА WEBRTC (ПЕРЕНЕСЕНО ИЗ SKYPE7.PY) ---
        function createPeerConnection(remoteId) {
            peerConnection = new RTCPeerConnection(STUN_SERVERS);
            
            if (localStream) {
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                
                // ТОТ САМЫЙ ФИКС: Если нет камеры, принудительно открываем канал на прием видео
                if (localStream.getVideoTracks().length === 0) {
                    peerConnection.addTransceiver('video', { direction: 'recvonly' });
                }
            } else {
                // Если нет вообще микрофона и камеры
                peerConnection.addTransceiver('audio', { direction: 'recvonly' });
                peerConnection.addTransceiver('video', { direction: 'recvonly' });
            }
            
            peerConnection.ontrack = e => {
                const remoteVid = document.getElementById('remoteVideo');
                if (remoteVid.srcObject !== e.streams[0]) {
                    remoteVid.srcObject = e.streams[0];
                }
            };
            
            peerConnection.onicecandidate = e => {
                if (e.candidate) {
                    db.ref(`webrtc/${remoteId}`).push({
                        action: 'candidate',
                        sender: myId,
                        data: JSON.parse(JSON.stringify(e.candidate))
                    });
                }
            };
        }

        function processIceQueue() {
            while (iceCandidatesQueue.length > 0) {
                peerConnection.addIceCandidate(new RTCIceCandidate(iceCandidatesQueue.shift())).catch(console.error);
            }
        }

        // --- 6. ОБРАБОТКА СИГНАЛОВ WEBRTC ЧЕРЕЗ FIREBASE ---
        db.ref(`webrtc/${myId}`).on('child_added', async (snap) => {
            const msg = snap.val();
            snap.ref.remove(); // Удаляем после прочтения

            if (msg.action === 'offer') {
                if (!peerConnection) createPeerConnection(msg.sender);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.data));
                processIceQueue();
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                db.ref(`webrtc/${msg.sender}`).push({ action: 'answer', sender: myId, data: JSON.parse(JSON.stringify(answer)) });
                
            } else if (msg.action === 'answer' && peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.data));
                processIceQueue();
                
            } else if (msg.action === 'candidate') {
                if (peerConnection && peerConnection.remoteDescription) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(msg.data)).catch(console.error);
                } else {
                    iceCandidatesQueue.push(msg.data);
                }
            }
        });

        // --- 7. ВХОДЯЩИЕ И ИСХОДЯЩИЕ ЗВОНКИ ---
        db.ref(`calls/${myId}`).on('value', snapshot => {
            const data = snapshot.val();
            if (data && data.status === 'ringing') {
                activeRemoteId = data.callerId;
                document.getElementById('callerIdDisplay').textContent = data.callerId;
                document.getElementById('incomingCall').classList.add('active');
                updateStatus('Входящий вызов...', 'warning');
            } else if (!data) {
                document.getElementById('incomingCall').classList.remove('active');
            }
        });

        document.getElementById('connectBtn').onclick = async () => {
            const remoteId = document.getElementById('remoteId').value.trim();
            if (!remoteId || remoteId === myId) return alert('Введите корректный ID');
            
            activeRemoteId = remoteId;
            iceCandidatesQueue = [];
            updateStatus('Дозвон...', 'warning');
            
            const btn = document.getElementById('connectBtn');
            btn.textContent = 'Отменить вызов';
            
            let callRef = db.ref(`calls/${remoteId}`);
            callRef.set({ callerId: myId, status: 'ringing' });

            btn.onclick = () => {
                callRef.remove(); callRef.off(); activeRemoteId = null;
                btn.textContent = '📞 Позвонить'; btn.onclick = arguments.callee;
                updateStatus('В сети', 'success');
            };

            callRef.on('value', async snap => {
                const data = snap.val();
                if (data && data.status === 'answered') {
                    callRef.off(); 
                    
                    // Собеседник ответил! Запускаем медиа и формируем оффер
                    await startMedia();
                    showCallUI();
                    
                    createPeerConnection(activeRemoteId);
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    db.ref(`webrtc/${activeRemoteId}`).push({ action: 'offer', sender: myId, data: JSON.parse(JSON.stringify(offer)) });
                    
                } else if (data && data.status === 'rejected') {
                    callRef.off(); activeRemoteId = null;
                    btn.textContent = '📞 Позвонить'; btn.onclick = arguments.callee;
                    updateStatus('Отклонено/Занято', 'warning');
                    setTimeout(() => updateStatus('В сети', 'success'), 3000);
                }
            });
        };

        // ПРИНЯТЬ / ОТКЛОНИТЬ
        document.getElementById('answerBtn').onclick = async () => {
            document.getElementById('incomingCall').classList.remove('active');
            db.ref(`calls/${myId}`).update({ status: 'answered' });
            
            iceCandidatesQueue = [];
            await startMedia();
            showCallUI();
            // Дальше ждем оффер от вызывающего по каналу `webrtc`
        };

        document.getElementById('rejectBtn').onclick = () => {
            document.getElementById('incomingCall').classList.remove('active');
            db.ref(`calls/${myId}`).update({ status: 'rejected' });
            setTimeout(() => db.ref(`calls/${myId}`).remove(), 1000);
            updateStatus('В сети', 'success');
        };

        // Завершение звонка
        document.getElementById('leaveCallBtn').onclick = () => {
            db.ref(`calls/${myId}`).remove();
            if(activeRemoteId) {
                db.ref(`calls/${activeRemoteId}`).remove();
                db.ref(`screenshares/${activeRemoteId}`).off();
            }
            stopJpegScreenShare();
            window.location.reload(); 
        };

        // --- 8. УЛУЧШЕННАЯ JPEG ТРАНСЛЯЦИЯ ЭКРАНА (ДЛЯ ПК И МОБИЛЬНЫХ) ---
        let screenStream = null;
        let jpegInterval = null;
        let isSharing = false;

        document.getElementById('jpegShareBtn').onclick = async () => {
            if (isSharing) {
                stopJpegScreenShare();
                return;
            }

            try {
                // ИЗМЕНЕНИЕ: Убрали {cursor: "always"}, так как он вызывает сбои на мобильных устройствах
                // Просто запрашиваем {video: true}, что является стандартом и лучше поддерживается
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                isSharing = true;
                
                document.getElementById('jpegShareBtn').textContent = '⏹️ Остановить трансляцию';
                document.getElementById('jpegShareBtn').classList.add('red');

                const video = document.createElement('video');
                video.srcObject = screenStream;
                video.play();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                jpegInterval = setInterval(() => {
                    if (video.videoWidth) {
                        canvas.width = 640; 
                        canvas.height = (video.videoHeight / video.videoWidth) * 640;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        const jpegData = canvas.toDataURL('image/jpeg', 0.4); 
                        db.ref(`screenshares/${myId}`).set({ img: jpegData, ts: Date.now() });
                    }
                }, 333);

                screenStream.getVideoTracks()[0].onended = stopJpegScreenShare;

            } catch (e) {
                alert('Не удалось захватить экран (возможно устройство не поддерживает эту функцию). Ошибка: ' + e.message);
            }
        };

        function stopJpegScreenShare() {
            isSharing = false;
            clearInterval(jpegInterval);
            if(screenStream) screenStream.getTracks().forEach(t => t.stop());
            db.ref(`screenshares/${myId}`).remove();
            
            const btn = document.getElementById('jpegShareBtn');
            if (btn) {
                btn.textContent = '🖥️ Поделиться экраном (JPEG)';
                btn.classList.remove('red');
            }
        }
    </script>
</body>
</html>
