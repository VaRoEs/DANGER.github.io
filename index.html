<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win7 Скайп</title>
    
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Подключаем Metered SDK (WebRTC SFU) -->
    <script src="https://cdn.metered.ca/sdk/frame/1.4.3/sdk-frame.min.js"></script>

    <style>
        /* --- СТИЛЬ WINDOWS 7 AERO GLASS --- */
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: radial-gradient(circle at 50% 100%, #2989D8 0%, #155A8A 50%, #00284F 100%);
            min-height: 100vh; height: 100dvh; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }
        
        .aero-window {
            width: 95%; max-width: 450px;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 25px rgba(255,255,255,0.7);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            display: flex; flex-direction: column;
        }

        .title-bar {
            background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(220,220,220,0.3) 100%);
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            border-top-left-radius: 7px; border-top-right-radius: 7px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .title-bar .title {
            color: #000; font-size: 14px; font-weight: 600; text-shadow: 0 0 5px #fff, 0 0 10px #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .title-bar .controls {
            display: flex; gap: 4px;
        }
        .win-btn {
            width: 26px; height: 20px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5); cursor: pointer;
        }
        .win-btn.close {
            background: linear-gradient(to bottom, #faa 0%, #e33 50%, #c00 51%, #e33 100%);
        }

        .content-area {
            background: #fff;
            margin: 0 5px 5px 5px; border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.3);
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        h2 { color: #003399; font-size: 20px; margin-bottom: 20px; font-weight: 400; }
        
        .id-box { 
            background: #f0f4f8; padding: 15px; border-radius: 5px; margin-bottom: 20px; 
            width: 100%; border: 1px solid #cdd8e4; text-align: center;
        }
        .id-box p { color: #555; font-size: 13px; margin-bottom: 5px; }
        .my-id { font-size: 36px; color: #003399; letter-spacing: 3px; font-family: 'Consolas', monospace; }
        
        .status { 
            padding: 8px; border-radius: 3px; font-weight: 600; margin-bottom: 20px; 
            font-size: 13px; width: 100%; text-align: center; border: 1px solid transparent;
        }
        .status.success { background: #dff0d8; color: #3c763d; border-color: #d6e9c6; }
        .status.warning { background: #fcf8e3; color: #8a6d3b; border-color: #faebcc; }
        
        input {
            width: 100%; padding: 10px; border: 1px solid #abadb3; border-radius: 3px; font-size: 18px;
            text-align: center; margin-bottom: 15px; outline: none; background: #fff;
        }
        input:focus { border-color: #3399ff; box-shadow: 0 0 5px rgba(51,153,255,0.5); }
        
        .glossy-btn {
            width: 100%; padding: 10px; border-radius: 3px; font-size: 15px;
            background: linear-gradient(to bottom, #f2f9fe 0%, #d6f0fd 49%, #bee6fd 50%, #a7d9f5 100%);
            border: 1px solid #7ebef7; color: #000; cursor: pointer; transition: 0.1s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.1);
        }
        .glossy-btn:hover { background: linear-gradient(to bottom, #e2f4fe 0%, #c6eafc 49%, #9edafb 50%, #87cbf3 100%); }
        .glossy-btn:active { background: linear-gradient(to bottom, #a7d9f5 0%, #bee6fd 49%, #d6f0fd 50%, #f2f9fe 100%); box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
        
        .glossy-btn.green {
            background: linear-gradient(to bottom, #f4fbf4 0%, #dcf0dc 49%, #c3e6c3 50%, #a8d9a8 100%);
            border-color: #7fbf7f;
        }
        .glossy-btn.red {
            background: linear-gradient(to bottom, #fbf4f4 0%, #f0dcdc 49%, #e6c3c3 50%, #d9a8a8 100%);
            border-color: #bf7f7f;
        }

        .incoming-box {
            display: none; background: #ffffcc; border: 1px solid #ffcc00;
            padding: 15px; border-radius: 3px; margin-top: 15px; width: 100%; text-align: center;
        }
        .incoming-box.active { display: block; }
        .incoming-box p { color: #333; font-size: 15px; margin-bottom: 10px; }
        .action-buttons { display: flex; gap: 5px; }

        /* --- ЭКРАН ЗВОНКА --- */
        #callScreen {
            display: none; width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; background: #000; border-radius: 8px; overflow: hidden;
        }
        #metered-frame { width: 100%; height: 100%; border: none; }
        
        /* Свой локальный превью (лицо) – поверх основного видео, маленькое окошко */
        #localPreview {
            position: absolute; bottom: 80px; right: 10px; 
            width: 120px; height: 160px; 
            border: 2px solid rgba(255,255,255,0.7); border-radius: 8px;
            background: #222; z-index: 60; object-fit: cover;
            display: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
        }

        .call-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
            background: rgba(255,255,255,0.3); padding: 10px; border-radius: 10px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5);
        }
        .cam-toggle {
            position: absolute; bottom: 80px; left: 10px; z-index: 80;
            background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #fff;
            border-radius: 30px; padding: 8px 14px; font-size: 13px;
            backdrop-filter: blur(5px); cursor: pointer;
        }
        .cam-toggle:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="aero-window" id="mainWindow">
        <div class="title-bar">
            <div class="title">📱 Windows 7 Skype</div>
            <div class="controls">
                <button class="win-btn" style="background: linear-gradient(to bottom, #f0f0f0, #ccc);"></button>
                <button class="win-btn close" onclick="window.close()"></button>
            </div>
        </div>
        
        <div class="content-area" id="menuScreen">
            <h2>Ваш профиль</h2>
            
            <div class="id-box">
                <p>Твой постоянный ID:</p>
                <div class="my-id" id="myIdDisplay">0000</div>
            </div>
            
            <div class="status success" id="status">В сети. Ожидание вызовов...</div>
            
            <input type="text" id="remoteId" placeholder="ID друга (4 цифры)" maxlength="4" />
            
            <button class="glossy-btn" id="connectBtn" style="margin-bottom: 10px;">📞 Позвонить</button>
            <!-- Кнопка для включения камеры (лицо) -->
            <button class="glossy-btn" id="cameraToggleBtn" style="font-size: 13px; margin-bottom:10px;">📷 Включить камеру (лицо)</button>
            
            <div class="incoming-box" id="incomingCall">
                <p>📞 Входящий: <strong id="callerIdDisplay">...</strong></p>
                <div class="action-buttons">
                    <button class="glossy-btn green" id="answerBtn">Принять</button>
                    <button class="glossy-btn red" id="rejectBtn">Отклонить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ЗВОНКА -->
    <div id="callScreen">
        <div id="metered-frame"></div>
        <!-- Локальное превью (твоё лицо) -->
        <video id="localPreview" autoplay muted playsinline></video>
        <!-- Кнопка переключения камеры -->
        <button class="cam-toggle" id="switchCamBtn">🔄 Камера</button>
        
        <div class="call-controls">
            <button class="glossy-btn red" id="leaveCallBtn">Завершить</button>
        </div>
    </div>

    <script>
        // --- 1. НАСТРОЙКИ FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyB2_1QSx32s7EpymuHZ0UzmHur4sSEiTvQ",
            authDomain: "skype7q.firebaseapp.com",
            databaseURL: "https://skype7q-default-rtdb.firebaseio.com",
            projectId: "skype7q",
            storageBucket: "skype7q.firebasestorage.app",
            messagingSenderId: "4846139446",
            appId: "1:4846139446:web:f2b24c3da4d0887f3a8097"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // --- 2. ИДЕНТИФИКАЦИЯ ---
        let myId = localStorage.getItem('my_skype_id');
        if (!myId) {
            myId = Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('my_skype_id', myId);
        }
        document.getElementById('myIdDisplay').textContent = myId;
        db.ref(`calls/${myId}`).remove(); 

        let inCall = false;
        let activeRemoteId = null; 
        let localStream = null;     // поток с камеры (лицо)
        let isCameraOn = false;
        let meteredFrameInstance = null;

        // --- 3. ИНТЕРФЕЙС ---
        function updateStatus(msg, type = 'success') {
            const el = document.getElementById('status');
            el.textContent = msg; el.className = 'status ' + type;
        }

        // --- 4. ВХОДЯЩИЕ ЗВОНКИ ---
        db.ref(`calls/${myId}`).on('value', snapshot => {
            const data = snapshot.val();
            if (data && data.status === 'ringing') {
                if (inCall) { db.ref(`calls/${myId}`).update({ status: 'rejected' }); return; }
                activeRemoteId = data.callerId;
                document.getElementById('callerIdDisplay').textContent = data.callerId;
                document.getElementById('incomingCall').classList.add('active');
                updateStatus('Входящий вызов...', 'warning');
            } else {
                document.getElementById('incomingCall').classList.remove('active');
                if (!inCall) updateStatus('В сети. Ожидание вызовов...', 'success');
            }
        });

        // --- 5. ИСХОДЯЩИЙ ЗВОНОК ---
        document.getElementById('connectBtn').onclick = () => {
            const remoteId = document.getElementById('remoteId').value.trim();
            if (!remoteId || remoteId === myId) return alert('Введите корректный ID');
            
            inCall = true;
            activeRemoteId = remoteId;
            updateStatus('Дозвон...', 'warning');
            
            const btn = document.getElementById('connectBtn');
            btn.textContent = 'Отменить вызов';
            
            let callRef = db.ref(`calls/${remoteId}`);
            callRef.set({ callerId: myId, status: 'ringing' });

            btn.onclick = () => {
                callRef.remove(); callRef.off(); inCall = false; activeRemoteId = null;
                btn.textContent = '📞 Позвонить'; btn.onclick = arguments.callee;
                updateStatus('В сети', 'success');
                stopLocalCamera();
            };

            callRef.on('value', snap => {
                const data = snap.val();
                if (data && data.status === 'answered') {
                    callRef.off(); callRef.remove(); startMeteredCall();
                } else if (data && data.status === 'rejected') {
                    callRef.off(); inCall = false; activeRemoteId = null;
                    btn.textContent = '📞 Позвонить'; btn.onclick = arguments.callee;
                    updateStatus('Отклонено/Занято', 'warning');
                    setTimeout(() => updateStatus('В сети', 'success'), 3000);
                    stopLocalCamera();
                }
            });
        };

        // --- 6. ПРИНЯТЬ / ОТКЛОНИТЬ ---
        document.getElementById('answerBtn').onclick = () => {
            inCall = true; document.getElementById('incomingCall').classList.remove('active');
            db.ref(`calls/${myId}`).update({ status: 'answered' });
            startMeteredCall();
        };
        document.getElementById('rejectBtn').onclick = () => {
            document.getElementById('incomingCall').classList.remove('active');
            db.ref(`calls/${myId}`).update({ status: 'rejected' });
            setTimeout(() => db.ref(`calls/${myId}`).remove(), 1000);
            updateStatus('В сети', 'success');
            stopLocalCamera();
        };

        // --- 7. METERED SDK (WebRTC, 60 FPS) + локальная камера ---
        function startMeteredCall() {
            document.getElementById('mainWindow').style.display = 'none';
            document.getElementById('callScreen').style.display = 'block';
            
            let options = {
                roomURL: "skype777.metered.live/78",
                requireCamera: false,
                requireMicrophone: false
            };
            
            // Если камера включена — передаём свой стрим
            if (isCameraOn && localStream) {
                options.stream = localStream;
                if (localStream.getAudioTracks().length > 0) {
                    options.requireMicrophone = true;
                }
            }
            
            meteredFrameInstance = new MeteredFrame(); 
            meteredFrameInstance.init(options, document.getElementById("metered-frame"));

            // Показываем локальное превью если камера включена
            if (isCameraOn && localStream) {
                document.getElementById('localPreview').srcObject = localStream;
                document.getElementById('localPreview').style.display = 'block';
            } else {
                document.getElementById('localPreview').style.display = 'none';
            }
        }

        // --- 8. УПРАВЛЕНИЕ КАМЕРОЙ (виртуальный поток, если нет камеры) ---
        async function startLocalCamera() {
            try {
                // Пытаемся получить реальную камеру
                let constraints = { video: { facingMode: "user", width: { ideal: 320 }, height: { ideal: 240 } }, audio: false };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                isCameraOn = true;
                document.getElementById('cameraToggleBtn').textContent = '📷 Выключить камеру';
                document.getElementById('cameraToggleBtn').classList.add('red');
                
                if (inCall && meteredFrameInstance) {
                    document.getElementById('metered-frame').innerHTML = '';
                    let options = {
                        roomURL: "skype777.metered.live/78",
                        requireCamera: false,
                        requireMicrophone: false,
                        stream: localStream
                    };
                    meteredFrameInstance = new MeteredFrame();
                    meteredFrameInstance.init(options, document.getElementById("metered-frame"));
                    document.getElementById('localPreview').srcObject = localStream;
                    document.getElementById('localPreview').style.display = 'block';
                }
                
                if (!inCall) {
                    updateStatus('Камера включена (ожидание вызова)', 'success');
                }
            } catch (e) {
                console.warn('Реальная камера недоступна, создаём ВИРТУАЛЬНУЮ (будет видна на устройстве без камеры)');
                // СОЗДАЁМ ВИРТУАЛЬНЫЙ ПОТОК (canvas) с динамическим содержимым
                const canvas = document.createElement('canvas');
                canvas.width = 320; canvas.height = 240;
                const ctx = canvas.getContext('2d');
                let frame = 0;
                function drawFrame() {
                    ctx.fillStyle = '#003399';
                    ctx.fillRect(0, 0, 320, 240);
                    ctx.fillStyle = '#fff';
                    ctx.font = '20px Segoe UI';
                    ctx.fillText('📷 Виртуальная камера', 50, 80);
                    ctx.font = '16px Segoe UI';
                    ctx.fillText('ID: ' + myId, 110, 130);
                    // Анимация
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillRect(20 + frame % 60, 180, 30, 30);
                    ctx.fillStyle = '#ff6b6b';
                    ctx.beginPath();
                    ctx.arc(280, 200, 10 + Math.sin(frame/10)*5, 0, Math.PI*2);
                    ctx.fill();
                    frame++;
                    requestAnimationFrame(drawFrame);
                }
                drawFrame();
                // Создаём поток из canvas (30 FPS)
                const stream = canvas.captureStream(30);
                localStream = stream;
                isCameraOn = true;
                document.getElementById('cameraToggleBtn').textContent = '📷 Выключить камеру';
                document.getElementById('cameraToggleBtn').classList.add('red');
                
                if (inCall && meteredFrameInstance) {
                    document.getElementById('metered-frame').innerHTML = '';
                    let options = {
                        roomURL: "skype777.metered.live/78",
                        requireCamera: false,
                        requireMicrophone: false,
                        stream: localStream
                    };
                    meteredFrameInstance = new MeteredFrame();
                    meteredFrameInstance.init(options, document.getElementById("metered-frame"));
                    document.getElementById('localPreview').srcObject = localStream;
                    document.getElementById('localPreview').style.display = 'block';
                }
            }
        }

        function stopLocalCamera() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            isCameraOn = false;
            document.getElementById('cameraToggleBtn').textContent = '📷 Включить камеру (лицо)';
            document.getElementById('cameraToggleBtn').classList.remove('red');
            document.getElementById('localPreview').style.display = 'none';
            
            if (inCall && meteredFrameInstance) {
                document.getElementById('metered-frame').innerHTML = '';
                let options = {
                    roomURL: "skype777.metered.live/78",
                    requireCamera: false,
                    requireMicrophone: false
                };
                meteredFrameInstance = new MeteredFrame();
                meteredFrameInstance.init(options, document.getElementById("metered-frame"));
            }
        }

        // Кнопка включения/выключения камеры
        document.getElementById('cameraToggleBtn').onclick = () => {
            if (isCameraOn) {
                stopLocalCamera();
            } else {
                startLocalCamera();
            }
        };

        // Переключение камеры
        document.getElementById('switchCamBtn').onclick = async () => {
            if (!isCameraOn || !localStream) return alert('Сначала включите камеру');
            const videoTrack = localStream.getVideoTracks()[0];
            if (!videoTrack) return;
            // Если трек от canvas — не переключаем
            if (videoTrack.label && videoTrack.label.includes('canvas')) {
                alert('Это виртуальная камера, переключение недоступно');
                return;
            }
            const settings = videoTrack.getSettings();
            let newFacing = settings.facingMode === 'user' ? 'environment' : 'user';
            stopLocalCamera();
            try {
                const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: newFacing }, audio: false });
                localStream = newStream;
                isCameraOn = true;
                document.getElementById('cameraToggleBtn').textContent = '📷 Выключить камеру';
                document.getElementById('cameraToggleBtn').classList.add('red');
                if (inCall && meteredFrameInstance) {
                    document.getElementById('metered-frame').innerHTML = '';
                    let options = {
                        roomURL: "skype777.metered.live/78",
                        requireCamera: false,
                        requireMicrophone: false,
                        stream: localStream
                    };
                    meteredFrameInstance = new MeteredFrame();
                    meteredFrameInstance.init(options, document.getElementById("metered-frame"));
                    document.getElementById('localPreview').srcObject = localStream;
                    document.getElementById('localPreview').style.display = 'block';
                }
            } catch(e) {
                alert('Не удалось переключить камеру');
            }
        };

        // --- 9. ЗАВЕРШЕНИЕ ЗВОНКА ---
        document.getElementById('leaveCallBtn').onclick = () => {
            db.ref(`calls/${myId}`).remove();
            if(activeRemoteId) db.ref(`screenshares/${activeRemoteId}`).off();
            stopLocalCamera();
            if (meteredFrameInstance) {
                try { meteredFrameInstance.close(); } catch(e) {}
            }
            window.location.reload(); 
        };

        // --- 10. ЗАГРУЗКА ---
        console.log('Skype ready. ID:', myId);
    </script>
</body>
</html>
