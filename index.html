<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win7 Скайп (Full WebRTC)</title>
    
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- СТИЛЬ WINDOWS 7 AERO GLASS --- */
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: radial-gradient(circle at 50% 100%, #2989D8 0%, #155A8A 50%, #00284F 100%);
            min-height: 100vh; height: 100dvh; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }
        
        .aero-window {
            width: 95%; max-width: 450px; min-height: 400px;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 25px rgba(255,255,255,0.7);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            display: flex; flex-direction: column;
            transition: max-width 0.5s ease-in-out, height 0.5s ease-in-out, border-radius 0.3s;
        }

        .aero-window.in-call {
            max-width: 1000px;
            height: 85vh;
        }

        /* Если включен полноэкранный режим */
        :fullscreen .aero-window {
            width: 100%; max-width: 100%; height: 100vh; border-radius: 0; border: none;
        }

        .title-bar {
            background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(220,220,220,0.3) 100%);
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            border-top-left-radius: 7px; border-top-right-radius: 7px;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        :fullscreen .title-bar { border-radius: 0; }
        
        .title-bar .title {
            color: #000; font-size: 14px; font-weight: 600; text-shadow: 0 0 5px #fff, 0 0 10px #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .title-bar .controls { display: flex; gap: 4px; }
        
        .win-btn {
            width: 26px; height: 20px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5); cursor: pointer;
        }
        .win-btn.close { background: linear-gradient(to bottom, #faa 0%, #e33 50%, #c00 51%, #e33 100%); }

        .content-area {
            background: #fff; margin: 0 5px 5px 5px; border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.3); padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
            flex-grow: 1; overflow-y: auto;
        }
        :fullscreen .content-area { margin: 0; border-radius: 0; border: none; }

        h2 { color: #003399; font-size: 20px; margin-bottom: 20px; font-weight: 400; }
        
        .id-box { 
            background: #f0f4f8; padding: 15px; border-radius: 5px; margin-bottom: 15px; 
            width: 100%; border: 1px solid #cdd8e4; text-align: center;
        }
        .id-box p { color: #555; font-size: 13px; margin-bottom: 5px; }
        .my-id { font-size: 36px; color: #003399; letter-spacing: 3px; font-family: 'Consolas', monospace; }
        
        .status { 
            padding: 8px; border-radius: 3px; font-weight: 600; margin-bottom: 15px; 
            font-size: 13px; width: 100%; text-align: center; border: 1px solid transparent;
        }
        .status.success { background: #dff0d8; color: #3c763d; border-color: #d6e9c6; }
        .status.warning { background: #fcf8e3; color: #8a6d3b; border-color: #faebcc; }
        
        input[type="text"] {
            width: 100%; padding: 10px; border: 1px solid #abadb3; border-radius: 3px; font-size: 18px;
            text-align: center; margin-bottom: 15px; outline: none; background: #fff;
        }
        input[type="text"]:focus { border-color: #3399ff; box-shadow: 0 0 5px rgba(51,153,255,0.5); }
        
        /* Кнопки меню в ряд */
        .menu-buttons-row {
            display: flex; gap: 10px; width: 100%; margin-bottom: 10px;
        }

        .glossy-btn {
            width: 100%; padding: 10px; border-radius: 3px; font-size: 14px; font-weight: 600;
            background: linear-gradient(to bottom, #f2f9fe 0%, #d6f0fd 49%, #bee6fd 50%, #a7d9f5 100%);
            border: 1px solid #7ebef7; color: #000; cursor: pointer; transition: 0.1s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.1);
        }
        .glossy-btn:hover { background: linear-gradient(to bottom, #e2f4fe 0%, #c6eafc 49%, #9edafb 50%, #87cbf3 100%); }
        .glossy-btn.green { background: linear-gradient(to bottom, #f4fbf4 0%, #dcf0dc 49%, #c3e6c3 50%, #a8d9a8 100%); border-color: #7fbf7f; }
        .glossy-btn.red { background: linear-gradient(to bottom, #fbf4f4 0%, #f0dcdc 49%, #e6c3c3 50%, #d9a8a8 100%); border-color: #bf7f7f; }

        /* --- НАСТРОЙКИ УСТРОЙСТВ --- */
        .settings-panel {
            width: 100%; background: #f9f9f9; border: 1px solid #d9d9d9;
            padding: 15px; border-radius: 3px; margin-bottom: 15px; display: none;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .settings-panel label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; font-weight: 600; }
        .settings-panel select { 
            width: 100%; padding: 6px; margin-bottom: 12px; border: 1px solid #abadb3; 
            border-radius: 3px; outline: none; font-family: 'Segoe UI'; font-size: 13px;
        }

        .incoming-box {
            display: none; background: #ffffcc; border: 1px solid #ffcc00;
            padding: 15px; border-radius: 3px; margin-top: 15px; width: 100%; text-align: center;
        }
        .incoming-box.active { display: block; animation: popIn 0.3s ease-out; }
        .action-buttons { display: flex; gap: 5px; }

        /* --- ЭКРАН ЗВОНКА И ПАНЕЛЬ УПРАВЛЕНИЯ --- */
        #callScreen {
            display: none; width: 100%; flex-grow: 1; position: relative;
            background: #000; border-radius: 0 0 7px 7px; overflow: hidden;
            animation: fadeIn 0.5s ease-in-out;
        }
        :fullscreen #callScreen { border-radius: 0; }
        
        .video-remote { width: 100%; height: 100%; object-fit: contain; background: #111; }
        
        .video-local {
            position: absolute; bottom: 90px; right: 20px; 
            width: 160px; height: 120px; 
            object-fit: cover; border-radius: 8px; background: #222; 
            border: 2px solid rgba(255,255,255,0.7);
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            transform: scaleX(-1); z-index: 5; display: none;
            transition: opacity 0.3s ease;
        }

        .call-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center;
            background: rgba(255,255,255,0.3); padding: 8px; border-radius: 10px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5);
            width: max-content; max-width: 95%;
        }

        /* Квадратные кнопки управления как в плеере Win7 */
        .ctrl-btn {
            width: 45px; height: 45px; border-radius: 5px; font-size: 20px;
            background: linear-gradient(to bottom, #f2f9fe 0%, #d6f0fd 49%, #bee6fd 50%, #a7d9f5 100%);
            border: 1px solid #7ebef7; color: #000; cursor: pointer; transition: 0.1s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center; text-decoration: none;
        }
        .ctrl-btn:hover { background: linear-gradient(to bottom, #e2f4fe 0%, #c6eafc 49%, #9edafb 50%, #87cbf3 100%); }
        .ctrl-btn:active { box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
        
        /* Красная кнопка, когда выключено */
        .ctrl-btn.off {
            background: linear-gradient(to bottom, #fbf4f4 0%, #f0dcdc 49%, #e6c3c3 50%, #d9a8a8 100%);
            border-color: #bf7f7f; opacity: 0.9;
        }
        
        .ctrl-btn.danger {
            background: linear-gradient(to bottom, #faa 0%, #e33 50%, #c00 51%, #e33 100%);
            border-color: #900; color: white; width: 60px;
        }

        /* Адаптация под мобильные устройства */
        @media (max-width: 480px) {
            .call-controls { gap: 5px; padding: 5px; }
            .ctrl-btn { width: 40px; height: 40px; font-size: 16px; }
            .ctrl-btn.danger { width: 50px; }
            .video-local { width: 100px; height: 130px; bottom: 80px; right: 10px; }
            .menu-buttons-row { flex-direction: column; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="aero-window" id="mainWindow">
        <div class="title-bar">
            <div class="title">📱 Windows 7 Skype</div>
            <div class="controls">
                <button class="win-btn" style="background: linear-gradient(to bottom, #f0f0f0, #ccc);"></button>
                <button class="win-btn close" onclick="window.close()"></button>
            </div>
        </div>
        
        <!-- МЕНЮ -->
        <div class="content-area" id="menuScreen">
            <h2>Ваш профиль</h2>
            <div class="id-box">
                <p>Твой постоянный ID:</p>
                <div class="my-id" id="myIdDisplay">0000</div>
            </div>
            
            <div class="status success" id="status">В сети. Ожидание вызовов...</div>
            <input type="text" id="remoteId" placeholder="ID друга (4 цифры)" maxlength="4" />
            
            <div class="menu-buttons-row">
                <button class="glossy-btn" id="connectBtn">📞 Позвонить</button>
                <button class="glossy-btn" id="initMediaBtn">⚙️ Устройства</button>
            </div>
            
            <!-- ПАНЕЛЬ НАСТРОЕК (Скрыта по умолчанию) -->
            <div class="settings-panel" id="settingsPanel">
                <label>Видеокамера:</label>
                <select id="videoSource"></select>
                <label>Микрофон:</label>
                <select id="audioSource"></select>
                <button class="glossy-btn green" id="applySettingsBtn" style="margin-top: 5px;">💾 Применить</button>
            </div>

            <div class="incoming-box" id="incomingCall">
                <p>📞 Входящий: <strong id="callerIdDisplay">...</strong></p>
                <div class="action-buttons">
                    <button class="glossy-btn green" id="answerBtn">Принять</button>
                    <button class="glossy-btn red" id="rejectBtn">Отклонить</button>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ЗВОНКА -->
        <div id="callScreen">
            <video id="remoteVideo" class="video-remote" autoplay playsinline></video>
            <video id="localVideo" class="video-local" autoplay muted playsinline></video>
            
            <div class="call-controls">
                <button class="ctrl-btn" id="toggleMicBtn" title="Микрофон">🎤</button>
                <button class="ctrl-btn" id="toggleCamBtn" title="Камера">📷</button>
                <button class="ctrl-btn" id="flipCamBtn" title="Повернуть камеру">🔄</button>
                <button class="ctrl-btn" id="shareScreenBtn" title="Трансляция экрана">🖥️</button>
                <button class="ctrl-btn" id="togglePipBtn" title="Скрыть себя">👁️</button>
                <button class="ctrl-btn" id="fullscreenBtn" title="Полный экран">⛶</button>
                <button class="ctrl-btn danger" id="leaveCallBtn" title="Завершить">📞</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE ИНИЦИАЛИЗАЦИЯ ---
        const firebaseConfig = {
            apiKey: "AIzaSyB2_1QSx32s7EpymuHZ0UzmHur4sSEiTvQ",
            authDomain: "skype7q.firebaseapp.com",
            databaseURL: "https://skype7q-default-rtdb.firebaseio.com",
            projectId: "skype7q"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let myId = localStorage.getItem('my_skype_id');
        if (!myId) {
            myId = Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('my_skype_id', myId);
        }
        document.getElementById('myIdDisplay').textContent = myId;
        db.ref(`calls/${myId}`).remove(); 

        // --- 2. WEBRTC ПЕРЕМЕННЫЕ И СОСТОЯНИЯ ---
        let localStream = null;
        let peerConnection = null;
        let inCall = false;
        let callRole = null; 
        let currentCallRef = null;
        let incomingOfferData = null;
        
        // Состояния
        let isAudioEnabled = true;
        let isVideoEnabled = true;
        let isScreenSharing = false;
        let isPipVisible = true;
        let savedCameraTrack = null; 
        let currentFacingMode = 'user';

        const stunServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

        function updateStatus(msg, type = 'success') {
            const el = document.getElementById('status');
            el.textContent = msg; el.className = 'status ' + type;
        }

        // --- 3. ИНИЦИАЛИЗАЦИЯ МЕДИА И НАСТРОЙКИ УСТРОЙСТВ ---
        async function getDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoSelect = document.getElementById('videoSource');
                const audioSelect = document.getElementById('audioSource');
                videoSelect.innerHTML = ''; audioSelect.innerHTML = '';
                
                devices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    if (device.kind === 'videoinput') {
                        option.text = device.label || `Камера ${videoSelect.length + 1}`;
                        videoSelect.appendChild(option);
                    } else if (device.kind === 'audioinput') {
                        option.text = device.label || `Микрофон ${audioSelect.length + 1}`;
                        audioSelect.appendChild(option);
                    }
                });
                
                const panel = document.getElementById('settingsPanel');
                if (panel.style.display !== 'block') {
                    panel.style.display = 'block';
                }
            } catch (e) {
                console.error("Ошибка получения устройств", e);
            }
        }

        async function startMedia() {
            const videoId = document.getElementById('videoSource').value;
            const audioId = document.getElementById('audioSource').value;
            
            let constraints = {
                audio: audioId ? { deviceId: { exact: audioId } } : true,
                video: videoId ? { deviceId: { exact: videoId } } : { facingMode: currentFacingMode }
            };

            try {
                const newStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                }
                
                localStream = newStream;
                document.getElementById('localVideo').srcObject = localStream;
                
                // Учитываем текущее состояние PiP
                document.getElementById('localVideo').style.display = isPipVisible ? 'block' : 'none';
                
                localStream.getAudioTracks().forEach(t => t.enabled = isAudioEnabled);
                localStream.getVideoTracks().forEach(t => t.enabled = isVideoEnabled);
                
                if (peerConnection) {
                    const audioSender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'audio');
                    const videoSender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    
                    if (audioSender && localStream.getAudioTracks()[0]) audioSender.replaceTrack(localStream.getAudioTracks()[0]);
                    if (videoSender && localStream.getVideoTracks()[0]) videoSender.replaceTrack(localStream.getVideoTracks()[0]);
                }

                document.getElementById('localVideo').style.transform = (!videoId && currentFacingMode === 'user') ? 'scaleX(-1)' : 'none';
                updateStatus('Устройства успешно подключены', 'success');
                
                if (document.getElementById('videoSource').options.length === 0) {
                    await getDevices();
                }
            } catch (e) {
                console.warn("Камера недоступна, пробуем только звук");
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: audioId ? { deviceId: { exact: audioId } } : true, video: false });
                    updateStatus('Подключен только микрофон', 'warning');
                    await getDevices();
                } catch (err) {
                    alert('Нет доступа к устройствам');
                }
            }
        }

        document.getElementById('initMediaBtn').onclick = async () => {
            const panel = document.getElementById('settingsPanel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                await startMedia();
            }
        };

        document.getElementById('applySettingsBtn').onclick = () => {
            if (isScreenSharing) {
                alert("Остановите трансляцию экрана для смены камеры");
                return;
            }
            startMedia();
        };

        // --- 4. УПРАВЛЕНИЕ ВО ВРЕМЯ ЗВОНКА (КНОПКИ С ПОДСВЕТКОЙ) ---
        
        document.getElementById('toggleMicBtn').onclick = () => {
            if (localStream && localStream.getAudioTracks().length > 0) {
                isAudioEnabled = !isAudioEnabled;
                localStream.getAudioTracks()[0].enabled = isAudioEnabled;
                document.getElementById('toggleMicBtn').classList.toggle('off', !isAudioEnabled);
            }
        };

        document.getElementById('toggleCamBtn').onclick = () => {
            if (localStream && localStream.getVideoTracks().length > 0) {
                isVideoEnabled = !isVideoEnabled;
                localStream.getVideoTracks()[0].enabled = isVideoEnabled;
                document.getElementById('toggleCamBtn').classList.toggle('off', !isVideoEnabled);
            }
        };

        document.getElementById('flipCamBtn').onclick = async () => {
            if (isScreenSharing) return alert("Остановите показ экрана");
            document.getElementById('videoSource').value = ''; 
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await startMedia();
        };

        // Включение/Отключение PiP (Локальное видео)
        document.getElementById('togglePipBtn').onclick = () => {
            isPipVisible = !isPipVisible;
            document.getElementById('localVideo').style.display = isPipVisible ? 'block' : 'none';
            document.getElementById('togglePipBtn').classList.toggle('off', !isPipVisible);
        };

        // Включение/Отключение Полноэкранного режима
        document.getElementById('fullscreenBtn').onclick = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Ошибка перехода в полный экран: ${err.message}`);
                });
                document.getElementById('fullscreenBtn').classList.add('off');
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fullscreenBtn').classList.remove('off');
                }
            }
        };

        // ТРАНСЛЯЦИЯ ЭКРАНА (Screen Share)
        document.getElementById('shareScreenBtn').onclick = async () => {
            if (isScreenSharing) {
                stopScreenShare();
            } else {
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const screenTrack = screenStream.getVideoTracks()[0];
                    
                    savedCameraTrack = localStream.getVideoTracks()[0];
                    
                    if (savedCameraTrack) localStream.removeTrack(savedCameraTrack);
                    localStream.addTrack(screenTrack);
                    
                    if (peerConnection) {
                        const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) sender.replaceTrack(screenTrack);
                    }
                    
                    document.getElementById('localVideo').srcObject = localStream;
                    document.getElementById('localVideo').style.transform = 'none'; 
                    
                    isScreenSharing = true;
                    document.getElementById('shareScreenBtn').classList.add('off'); 
                    
                    screenTrack.onended = () => stopScreenShare();

                } catch (e) {
                    console.error("Трансляция экрана отменена", e);
                }
            }
        };

        function stopScreenShare() {
            if (!isScreenSharing) return;
            const screenTrack = localStream.getVideoTracks()[0];
            if (screenTrack) screenTrack.stop();
            
            if (savedCameraTrack) {
                localStream.removeTrack(screenTrack);
                localStream.addTrack(savedCameraTrack);
                
                if (peerConnection) {
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) sender.replaceTrack(savedCameraTrack);
                }
                
                document.getElementById('localVideo').srcObject = localStream;
                const videoId = document.getElementById('videoSource').value;
                document.getElementById('localVideo').style.transform = (!videoId && currentFacingMode === 'user') ? 'scaleX(-1)' : 'none';
            }
            
            isScreenSharing = false;
            document.getElementById('shareScreenBtn').classList.remove('off');
        }

        // --- 5. СОЗДАНИЕ PEER CONNECTION ---
        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(stunServers);

            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                if (localStream.getVideoTracks().length === 0) {
                    peerConnection.addTransceiver('video', { direction: 'recvonly' });
                }
            } else {
                peerConnection.addTransceiver('audio', { direction: 'recvonly' });
                peerConnection.addTransceiver('video', { direction: 'recvonly' });
            }

            peerConnection.ontrack = event => {
                const remoteVid = document.getElementById('remoteVideo');
                if (remoteVid.srcObject !== event.streams[0]) {
                    remoteVid.srcObject = event.streams[0];
                }
            };

            peerConnection.onicecandidate = event => {
                if (event.candidate && currentCallRef) {
                    currentCallRef.child('candidates').child(callRole).push(event.candidate.toJSON());
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    endCall();
                }
            };
        }

        // --- 6. ИСХОДЯЩИЙ ЗВОНОК ---
        document.getElementById('connectBtn').onclick = async () => {
            const remoteId = document.getElementById('remoteId').value.trim();
            if (!remoteId || remoteId === myId) return alert('Введите корректный ID');
            
            inCall = true; callRole = 'caller';
            updateStatus('Дозвон...', 'warning');
            
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('mainWindow').classList.add('in-call');
            document.getElementById('callScreen').style.display = 'flex';

            currentCallRef = db.ref(`calls/${remoteId}`);
            createPeerConnection();

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await currentCallRef.set({ callerId: myId, offer: { type: offer.type, sdp: offer.sdp } });

            currentCallRef.child('answer').on('value', async snapshot => {
                const answer = snapshot.val();
                if (answer && !peerConnection.currentRemoteDescription) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                }
            });

            currentCallRef.child('candidates').child('callee').on('child_added', snapshot => {
                const candidate = snapshot.val();
                if (candidate && peerConnection.remoteDescription) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                }
            });
            
            currentCallRef.on('value', snap => {
                if (!snap.exists() && inCall) endCall();
            });
        };

        // --- 7. ВХОДЯЩИЕ ЗВОНКИ ---
        db.ref(`calls/${myId}`).on('value', snapshot => {
            const data = snapshot.val();
            if (data && data.offer && !inCall) {
                incomingOfferData = data;
                document.getElementById('callerIdDisplay').textContent = data.callerId;
                document.getElementById('incomingCall').classList.add('active');
                updateStatus('Входящий вызов...', 'warning');
            } else if (!data) {
                document.getElementById('incomingCall').classList.remove('active');
                if (inCall && callRole === 'callee') endCall();
                if (!inCall) updateStatus('В сети. Ожидание вызовов...', 'success');
            }
        });

        document.getElementById('answerBtn').onclick = async () => {
            document.getElementById('incomingCall').classList.remove('active');
            inCall = true; callRole = 'callee';
            
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('mainWindow').classList.add('in-call');
            document.getElementById('callScreen').style.display = 'flex';

            currentCallRef = db.ref(`calls/${myId}`);
            createPeerConnection();

            await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOfferData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await currentCallRef.child('answer').set({ type: answer.type, sdp: answer.sdp });

            currentCallRef.child('candidates').child('caller').on('child_added', snapshot => {
                const candidate = snapshot.val();
                if (candidate) peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            });
        };

        document.getElementById('rejectBtn').onclick = () => {
            db.ref(`calls/${myId}`).remove();
            document.getElementById('incomingCall').classList.remove('active');
            updateStatus('В сети', 'success');
        };

        // --- 8. ЗАВЕРШЕНИЕ ЗВОНКА ---
        function endCall() {
            if (isScreenSharing) stopScreenShare();
            
            // Выходим из фуллскрина если он был
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(e => console.log(e));
                document.getElementById('fullscreenBtn').classList.remove('off');
            }
            
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (currentCallRef) { currentCallRef.off(); currentCallRef.remove(); currentCallRef = null; }
            
            document.getElementById('remoteVideo').srcObject = null;
            inCall = false; callRole = null;

            document.getElementById('callScreen').style.display = 'none';
            document.getElementById('mainWindow').classList.remove('in-call');
            document.getElementById('menuScreen').style.display = 'flex';
            updateStatus('В сети. Ожидание вызовов...', 'success');
        }

        document.getElementById('leaveCallBtn').onclick = endCall;

    </script>
</body>
</html>
